<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenz attractor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>🦋</text>
    </svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <canvas id="attractor"></canvas>
  <div id="app">
    <div class="menu-toolbar">
      <button id="greenFlowButton" class="menu-button" type="button" aria-pressed="false">green flow</button>
      <button id="resetButton" class="menu-button icon-button" type="button" aria-label="Reset scene" title="Reset scene">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 5v4h4"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 19v-4h-4"></path>
        </svg>
      </button>
      <button id="screenshotButton" class="menu-button" type="button" aria-label="Take screenshot"
        title="Take screenshot">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4.75" y="4.75" width="14.5" height="14.5" rx="3.4"></rect>
          <circle cx="12" cy="12" r="3.3"></circle>
          <circle class="camera-dot" cx="16.35" cy="7.65" r="0.9"></circle>
        </svg>
      </button>
      <button id="hideMenuButton" class="menu-button" type="button">hide menu</button>
    </div>
    <div class="controls">
      <div class="temperature-control">
        <input class="temperature-slider-input" type="range" min="100" max="44444" value="3000" id="slider" tabindex="-1"
          aria-hidden="true">
        <button id="temperatureSlider" class="ios-vertical-slider temperature-slider" type="button" role="slider"
          aria-label="color temperature" aria-orientation="horizontal" aria-valuemin="100" aria-valuemax="44444"
          aria-valuenow="3000">
          <div id="temperatureSliderFill" class="ios-vertical-slider-fill"></div>
          <div id="temperatureSliderLabel" class="ios-vertical-slider-icon">3000K</div>
        </button>
      </div>
      <button id="speedSlider" class="ios-vertical-slider speed-slider" type="button" role="slider" aria-label="Animation speed"
        aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="50" aria-valuenow="1">
        <div id="speedSliderFill" class="ios-vertical-slider-fill"></div>
        <div id="speedSliderLabel" class="ios-vertical-slider-icon">speed</div>
      </button>
    </div>
    <div class="parameter-panel">
      <div class="parameter-panel-title">System variables</div>
      <div class="parameter-grid">
        <div class="parameter-field">
          <span>sigma (σ)</span>
          <div class="parameter-slider" data-key="sigma" data-slider-min="0" data-slider-max="60" role="slider"
            tabindex="0" aria-label="sigma" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="60"
            aria-valuenow="10">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">10</div>
            <input id="paramSigma" class="parameter-slider-input" type="text" step="0.1" value="10"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="sigma">
          </div>
        </div>
        <div class="parameter-field">
          <span>rho (ρ)</span>
          <div class="parameter-slider" data-key="rho" data-slider-min="0" data-slider-max="130" role="slider"
            tabindex="0" aria-label="rho" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="130"
            aria-valuenow="28">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">28</div>
            <input id="paramRho" class="parameter-slider-input" type="text" step="0.1" value="28"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="rho">
          </div>
        </div>
        <div class="parameter-field">
          <span>beta (β)</span>
          <div class="parameter-slider" data-key="beta" data-slider-min="0" data-slider-max="9" role="slider"
            tabindex="0" aria-label="beta" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="9"
            aria-valuenow="2.67">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">2.67</div>
            <input id="paramBeta" class="parameter-slider-input" type="text" step="0.01" value="2.67"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="beta">
          </div>
        </div>
        <div class="parameter-field">
          <span>x start</span>
          <div class="parameter-slider" data-key="x" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="x start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0.08">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0.08</div>
            <input id="paramX" class="parameter-slider-input" type="text" step="0.01" value="0.08"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="x start">
          </div>
        </div>
        <div class="parameter-field">
          <span>y start</span>
          <div class="parameter-slider" data-key="y" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="y start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0</div>
            <input id="paramY" class="parameter-slider-input" type="text" step="0.01" value="0"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="y start">
          </div>
        </div>
        <div class="parameter-field">
          <span>z start</span>
          <div class="parameter-slider" data-key="z" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="z start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0</div>
            <input id="paramZ" class="parameter-slider-input" type="text" step="0.01" value="0"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="z start">
          </div>
        </div>
      </div>
      <div class="parameter-actions">
        <button id="classicPresetButton" class="preset-button" type="button">Classic Lorenz</button>
      </div>
    </div>
    <div id="hint">
      <div class="hint-grid">
        <div class="hint-label">reset scene</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="reset">R</button></div>
        <div class="hint-label">toggle UI</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="toggle-ui">Space</button></div>
        <div class="hint-label">green flow</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="green-flow">Enter</button></div>
        <div class="hint-label">temperature <span id="hintTemperatureValue" class="hint-value">(3000K)</span></div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="temperature-down">&larr;</button><button class="hint-key" type="button" data-action="temperature-up">&rarr;</button></div>
        <div class="hint-label">speed</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="speed-up">&uarr;</button><button class="hint-key" type="button" data-action="speed-down">&darr;</button></div>
        <div class="hint-label">zoom <span id="hintZoomValue" class="hint-value">(1x)</span></div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="zoom-in">Wheel</button><button class="hint-key" type="button" data-action="zoom-out">+/-</button></div>
      </div>
    </div>
  </div>
  <button id="menuToggleButton" class="menu-button hidden hiddenMenu" type="button"></button>
</body>
<script>
  const app = document.getElementById("app")
  const slider = document.getElementById("slider")
  const temperatureSlider = document.getElementById("temperatureSlider")
  const temperatureSliderFill = document.getElementById("temperatureSliderFill")
  const temperatureSliderLabel = document.getElementById("temperatureSliderLabel")
  const speedSlider = document.getElementById("speedSlider")
  const speedSliderFill = document.getElementById("speedSliderFill")
  const speedSliderLabel = document.getElementById("speedSliderLabel")
  const greenFlowButton = document.getElementById("greenFlowButton")
  const resetButton = document.getElementById("resetButton")
  const screenshotButton = document.getElementById("screenshotButton")
  const hideMenuButton = document.getElementById("hideMenuButton")
  const menuToggleButton = document.getElementById("menuToggleButton")
  const classicPresetButton = document.getElementById("classicPresetButton")
  const hint = document.getElementById("hint")
  const hintTemperatureValue = document.getElementById("hintTemperatureValue")
  const hintZoomValue = document.getElementById("hintZoomValue")
  const canvas = document.getElementById("attractor")
  const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true }) || canvas.getContext("2d")
  const parameterInputs = {
    x: document.getElementById("paramX"),
    y: document.getElementById("paramY"),
    z: document.getElementById("paramZ"),
    sigma: document.getElementById("paramSigma"),
    rho: document.getElementById("paramRho"),
    beta: document.getElementById("paramBeta"),
  }
  const parameterSliders = Object.fromEntries(
    Object.keys(parameterInputs).map((key) => {
      const sliderControl = document.querySelector(`.parameter-slider[data-key="${key}"]`)

      return [key, {
        slider: sliderControl,
        fill: sliderControl?.querySelector(".parameter-slider-fill") ?? null,
        value: sliderControl?.querySelector(".parameter-slider-value") ?? null,
      }]
    })
  )
  const minSpeedMultiplier = 0
  const minActiveSpeedMultiplier = 0.003
  const maxSpeedMultiplier = 50
  const speedSliderEdgeThreshold = 0.002
  const speedSliderStopZone = 0.012
  const speedSliderCurveExponent = 1
  const defaultSpeedMultiplier = 1
  const speedIntroDuration = 2000
  const menuIntroMinOpacity = 0
  const baseTemperatureStep = 1
  const temperatureStepAccelerationInterval = 60
  const maxTemperatureStepMultiplier = 1000
  const parameterWheelStepBoost = 10
  const parameterSliderDragThreshold = 4
  const wheelLineHeight = 16
  const wheelPageHeight = 120
  const minZoomMultiplier = 0.01
  const maxZoomMultiplier = 1000
  const zoomStepFactor = 1.04
  const zoomTrailResetDebounceMs = 200
  const screenshotExportScale = 4
  const screenshotHistoryPointBudget = 600000
  const trailFadeAlpha = 0.04
  const trailLineWidth = 1.1
  const hintHoldStartDelay = 260
  const hintHoldRepeatInterval = 45
  const minVisibleAttractorIterations = 200
  const viewportPositionResetThreshold = 0.25
  const viewportTransformResetThreshold = 0.0005
  const holdableHintActions = new Set(["temperature-down", "temperature-up", "speed-up", "speed-down"])
  const baseTemperature = Number(slider.value)
  const classicPresetParameterKeys = ["sigma", "rho", "beta"]

  let width = 0
  let height = 0
  let pixelRatio = 1
  let uiHidden = false
  let speedMultiplier = minActiveSpeedMultiplier
  let zoomMultiplier = getDefaultZoomMultiplier()
  let greenBoost = false
  let greenFlowLocked = false
  let greenFlowHeld = false
  let classicPresetActive = false
  let classicPresetSnapshot = null
  let isDraggingAttractor = false
  let hasCustomAnchor = false
  let dragOffsetX = 0
  let dragOffsetY = 0
  let lastPointerX = 0
  let lastPointerY = 0
  let speedIntroActive = true
  let speedIntroStartedAt = null
  let menuIntroActive = true
  let activeTemperatureKey = null
  let temperatureKeyHoldStartedAt = 0
  let activeSpeedPointerId = null
  let activeTemperaturePointerId = null
  let pinchLastDistance = 0
  let pinchLastCenterX = 0
  let pinchLastCenterY = 0
  let pinchLastAngle = 0
  let menuToggleGlowTimeoutId = null
  let activeHintHoldAction = null
  let activeHintHoldPointerId = null
  let hintHoldTimeoutId = null
  let hintHoldIntervalId = null
  let isTakingScreenshot = false
  let pendingZoomTrailReset = false
  let zoomTrailResetTimeoutId = null
  let lastRenderedCenterX = Number.NaN
  let lastRenderedCenterY = Number.NaN
  let lastRenderedRotation = Number.NaN
  let renderHistoryPointCount = 0
  const activeKeyboardHintActions = new Set()

  const activeSceneTouches = new Map()
  const renderHistory = []

  const state = {
    x: 0.08,
    y: 0,
    z: 0,
    hue: 30,
    stroke: "rgba(255, 224, 176, 0.28)",
    glow: "rgba(255, 224, 176, 0.18)",
    temperatureScale: 14,
    scale: 14,
    speed: 2400,
    sigma: 10,
    rho: 28,
    beta: 8 / 3,
    rotation: 0,
    anchorX: 0,
    anchorY: 0,
    targetAnchorX: 0,
    targetAnchorY: 0,
  }

  function getTemperatureDynamics(k) {
    const normalized = (Number(k) - 1000) / 9000

    return {
      normalized,
      sigma: 8 + normalized * 10,
      rho: 18 + normalized * 22,
      beta: 1.8 + normalized * 1.4,
    }
  }

  function formatParameterValue(value, fractionDigits = 2) {
    return Number(value.toFixed(fractionDigits)).toString()
  }

  function getDefaultZoomMultiplier() {
    return window.matchMedia("(max-width: 1024px)").matches ? 0.7 : 1
  }

  const defaultInitialConditions = {
    x: Number(parameterInputs.x.value),
    y: Number(parameterInputs.y.value),
    z: Number(parameterInputs.z.value),
  }
  const initialConditions = { ...defaultInitialConditions }

  const defaultDynamics = getTemperatureDynamics(baseTemperature)
  const defaultParameters = {
    sigma: defaultDynamics.sigma,
    rho: defaultDynamics.rho,
    beta: defaultDynamics.beta,
  }
  const parameters = { ...defaultParameters }
  const parameterOverrides = {
    sigma: false,
    rho: false,
    beta: false,
  }

  parameterInputs.sigma.value = formatParameterValue(parameters.sigma)
  parameterInputs.rho.value = formatParameterValue(parameters.rho)
  parameterInputs.beta.value = formatParameterValue(parameters.beta)

  state.x = initialConditions.x
  state.y = initialConditions.y
  state.z = initialConditions.z
  state.sigma = parameters.sigma
  state.rho = parameters.rho
  state.beta = parameters.beta

  function hasPosition(x, y) {
    return x !== 0 || y !== 0
  }

  function getDefaultAnchorTarget() {
    return {
      x: width * 0.5,
      y: height * 0.18,
    }
  }

  function fillCanvasBackground(targetCtx, targetWidth, targetHeight, alpha = 1) {
    targetCtx.fillStyle = `rgba(0, 0, 0, ${alpha})`
    targetCtx.fillRect(0, 0, targetWidth, targetHeight)
  }

  function clearRenderHistory() {
    renderHistory.length = 0
    renderHistoryPointCount = 0
  }

  function trimRenderHistory() {
    while (renderHistoryPointCount > screenshotHistoryPointBudget && renderHistory.length > 1) {
      const discardedFrame = renderHistory.shift()

      if (!discardedFrame) {
        break
      }

      renderHistoryPointCount -= discardedFrame.points.length / 2
    }
  }

  function recordRenderFrame(points, strokeStyle) {
    renderHistory.push({ points, strokeStyle })
    renderHistoryPointCount += points.length / 2
    trimRenderHistory()
  }

  function drawRenderFrame(targetCtx, points, strokeStyle) {
    if (points.length < 2) {
      return
    }

    targetCtx.lineWidth = trailLineWidth
    targetCtx.strokeStyle = strokeStyle
    targetCtx.shadowBlur = 0
    targetCtx.shadowColor = strokeStyle
    targetCtx.beginPath()
    targetCtx.moveTo(points[0], points[1])

    for (let i = 2; i < points.length; i += 2) {
      targetCtx.lineTo(points[i], points[i + 1])
    }

    targetCtx.stroke()
    targetCtx.shadowBlur = 0
  }

  function replayRenderHistory(targetCtx, targetWidth, targetHeight) {
    fillCanvasBackground(targetCtx, targetWidth, targetHeight)

    renderHistory.forEach((frame, index) => {
      if (index > 0) {
        fillCanvasBackground(targetCtx, targetWidth, targetHeight, trailFadeAlpha)
      }

      drawRenderFrame(targetCtx, frame.points, frame.strokeStyle)
    })
  }

  function getFallbackExportCanvas() {
    const exportCanvas = document.createElement("canvas")
    const exportCtx = exportCanvas.getContext("2d")

    if (!exportCtx) {
      throw new Error("Could not create fallback export canvas context.")
    }

    exportCanvas.width = canvas.width
    exportCanvas.height = canvas.height
    exportCtx.translate(exportCanvas.width, exportCanvas.height)
    exportCtx.rotate(Math.PI)
    exportCtx.drawImage(canvas, 0, 0)

    return exportCanvas
  }

  function clearCanvas() {
    clearRenderHistory()
    ctx.clearRect(0, 0, width, height)
    fillCanvasBackground(ctx, width, height)
  }

  function createScreenshotFilename(prefix = "lorenz-screenshot") {
    const timestamp = new Date().toISOString().replaceAll(":", "-").replaceAll(".", "-")
    return `${prefix}-${timestamp}.png`
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob)
    const link = document.createElement("a")

    link.href = url
    link.download = filename
    document.body.append(link)
    link.click()
    link.remove()

    window.setTimeout(() => {
      URL.revokeObjectURL(url)
    }, 0)
  }

  function downloadCanvasAsPng(sourceCanvas, filename) {
    return new Promise((resolve, reject) => {
      if (typeof sourceCanvas.toBlob === "function") {
        sourceCanvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Could not create screenshot PNG blob."))
            return
          }

          downloadBlob(blob, filename)
          resolve()
        }, "image/png")
        return
      }

      try {
        const link = document.createElement("a")
        link.href = sourceCanvas.toDataURL("image/png")
        link.download = filename
        document.body.append(link)
        link.click()
        link.remove()
        resolve()
      } catch (error) {
        reject(error)
      }
    })
  }

  function getExportCanvas() {
    if (renderHistory.length === 0) {
      return getFallbackExportCanvas()
    }

    const exportCanvas = document.createElement("canvas")
    const exportCtx = exportCanvas.getContext("2d")

    if (!exportCtx) {
      throw new Error("Could not create export canvas context.")
    }

    const exportPixelRatio = pixelRatio * screenshotExportScale

    exportCanvas.width = Math.round(width * exportPixelRatio)
    exportCanvas.height = Math.round(height * exportPixelRatio)
    exportCtx.setTransform(
      -exportPixelRatio,
      0,
      0,
      -exportPixelRatio,
      exportCanvas.width,
      exportCanvas.height,
    )
    replayRenderHistory(exportCtx, width, height)

    return exportCanvas
  }

  async function saveSceneAsPng() {
    await downloadCanvasAsPng(getExportCanvas(), createScreenshotFilename("lorenz-canvas"))
  }

  async function handleScreenshotButtonClick() {
    if (isTakingScreenshot) {
      return
    }

    isTakingScreenshot = true
    screenshotButton.disabled = true

    try {
      await saveSceneAsPng()
    } finally {
      isTakingScreenshot = false
      screenshotButton.disabled = false
      screenshotButton.blur()
    }
  }

  function hasViewportChanged(centerX, centerY) {
    if (
      !Number.isFinite(lastRenderedCenterX) ||
      !Number.isFinite(lastRenderedCenterY) ||
      !Number.isFinite(lastRenderedRotation)
    ) {
      return true
    }

    return (
      Math.abs(centerX - lastRenderedCenterX) > viewportPositionResetThreshold ||
      Math.abs(centerY - lastRenderedCenterY) > viewportPositionResetThreshold ||
      Math.abs(state.rotation - lastRenderedRotation) > viewportTransformResetThreshold
    )
  }

  function syncRenderedViewport(centerX, centerY) {
    lastRenderedCenterX = centerX
    lastRenderedCenterY = centerY
    lastRenderedRotation = state.rotation
  }

  function clearZoomTrailResetDebounce() {
    if (zoomTrailResetTimeoutId !== null) {
      clearTimeout(zoomTrailResetTimeoutId)
      zoomTrailResetTimeoutId = null
    }

    pendingZoomTrailReset = false
  }

  function scheduleZoomTrailReset() {
    pendingZoomTrailReset = false

    if (zoomTrailResetTimeoutId !== null) {
      clearTimeout(zoomTrailResetTimeoutId)
    }

    zoomTrailResetTimeoutId = window.setTimeout(() => {
      zoomTrailResetTimeoutId = null
      pendingZoomTrailReset = true
    }, zoomTrailResetDebounceMs)
  }

  function isEditableTarget(target) {
    return target instanceof HTMLElement && (
      target.isContentEditable ||
      target.closest("input, textarea, select, button, [contenteditable='true']") !== null
    )
  }

  function isKeyboardHintIgnoredTarget(target) {
    return target instanceof HTMLElement && (
      target.isContentEditable ||
      target.closest("input, textarea, select, [contenteditable='true']") !== null
    )
  }

  function isUiTarget(target) {
    return target instanceof Element && target.closest("#app, #menuToggleButton") !== null
  }

  function isSceneInteractionTarget(target) {
    return !isUiTarget(target)
  }

  function isParameterControlTarget(target) {
    return target instanceof Element && target.closest(".parameter-slider") !== null
  }

  function clearDragInteraction() {
    isDraggingAttractor = false
    dragOffsetX = 0
    dragOffsetY = 0
  }

  function setAnchorFromVisibleCenter(centerX, centerY) {
    const nextAnchorX = width - centerX

    hasCustomAnchor = true
    state.anchorX = nextAnchorX
    state.targetAnchorX = nextAnchorX
    state.anchorY = height - centerY
    state.targetAnchorY = state.anchorY
  }

  function getActivePinchMetrics() {
    if (activeSceneTouches.size < 2) {
      return null
    }

    const [firstTouch, secondTouch] = Array.from(activeSceneTouches.values())
    const dx = secondTouch.x - firstTouch.x
    const dy = secondTouch.y - firstTouch.y

    return {
      centerX: (firstTouch.x + secondTouch.x) * 0.5,
      centerY: (firstTouch.y + secondTouch.y) * 0.5,
      distance: Math.hypot(dx, dy),
      angle: Math.atan2(dy, dx),
    }
  }

  function normalizeAngleDelta(angle) {
    if (angle > Math.PI) {
      return angle - Math.PI * 2
    }

    if (angle < -Math.PI) {
      return angle + Math.PI * 2
    }

    return angle
  }

  function syncPinchState() {
    const pinchMetrics = getActivePinchMetrics()

    if (!pinchMetrics) {
      pinchLastDistance = 0
      pinchLastCenterX = 0
      pinchLastCenterY = 0
      pinchLastAngle = 0
      return false
    }

    if (pinchLastDistance === 0) {
      pinchLastDistance = pinchMetrics.distance
      pinchLastCenterX = pinchMetrics.centerX
      pinchLastCenterY = pinchMetrics.centerY
      pinchLastAngle = pinchMetrics.angle
      return true
    }

    if (pinchMetrics.distance > 0) {
      const currentCenter = getVisibleAnchorPosition()
      const currentZoomMultiplier = zoomMultiplier
      const rotationDelta = normalizeAngleDelta(pinchMetrics.angle - pinchLastAngle)
      const nextZoomMultiplier = clamp(
        currentZoomMultiplier * (pinchMetrics.distance / pinchLastDistance),
        minZoomMultiplier,
        maxZoomMultiplier
      )
      const scaleRatio = nextZoomMultiplier / currentZoomMultiplier
      const offsetX = currentCenter.x - pinchLastCenterX
      const offsetY = currentCenter.y - pinchLastCenterY
      const cos = Math.cos(rotationDelta)
      const sin = Math.sin(rotationDelta)
      const rotatedOffsetX = (offsetX * cos - offsetY * sin) * scaleRatio
      const rotatedOffsetY = (offsetX * sin + offsetY * cos) * scaleRatio
      const nextCenterX = pinchMetrics.centerX + rotatedOffsetX
      const nextCenterY = pinchMetrics.centerY + rotatedOffsetY

      if (nextZoomMultiplier !== currentZoomMultiplier) {
        scheduleZoomTrailReset()
      }

      zoomMultiplier = nextZoomMultiplier
      state.rotation += rotationDelta
      setAnchorFromVisibleCenter(nextCenterX, nextCenterY)
      update()
    }

    pinchLastDistance = pinchMetrics.distance
    pinchLastCenterX = pinchMetrics.centerX
    pinchLastCenterY = pinchMetrics.centerY
    pinchLastAngle = pinchMetrics.angle

    return true
  }

  function setUiHidden(nextHidden) {
    uiHidden = nextHidden
    app.classList.toggle("hidden", uiHidden)
    menuToggleButton.classList.toggle("hidden", !uiHidden)

    if (uiHidden) {

    g = Math.min(255, Math.max(0, g))
    b = Math.min(255, Math.max(0, b))

      g: Math.round(g),
      b: Math.round(b),

    if (delta !== 0) {

      } else if (max === gn) {

      actions.push("speed-down")
    }

    if (!event.altKey && !event.ctrlKey && !event.metaKey
      && (event.key === "+" || event.key === "=" || event.key === "-" || event.key === "_")) {
      actions.push("zoom-out")
    }

    return actions
  }

  function performHintAction(action, { isRepeat = false } = {}) {
    if (action === "reset") {
      resetToInitialState()
      return
    }

    if (action === "toggle-ui") {
      setUiHidden(!uiHidden)
      return
    }

    if (action === "green-flow") {
      greenFlowLocked = !greenFlowLocked
      syncGreenFlowState()
      return
    }

    if (action === "temperature-down" || action === "temperature-up") {
      const code = getTemperatureCodeForHintAction(action)

      blurSliderFocus()
      nudgeTemperatureFromKey(code, isRepeat)
      return
    }

    if (action === "speed-up") {
      blurSliderFocus()
      nudgeSpeedMultiplier(1)
      return
    }

    if (action === "speed-down") {
      blurSliderFocus()
      nudgeSpeedMultiplier(-1)
      return
    }

    if (action === "zoom-in") {
      zoomAtPoint(zoomMultiplier * zoomStepFactor)
      return
    }

    if (action === "zoom-out") {
      zoomAtPoint(zoomMultiplier / zoomStepFactor)
    }
  }

  function stopHintHold() {
    const releasedAction = activeHintHoldAction

    if (hintHoldTimeoutId !== null) {
      clearTimeout(hintHoldTimeoutId)
      hintHoldTimeoutId = null
    }

    if (hintHoldIntervalId !== null) {
      clearInterval(hintHoldIntervalId)
      hintHoldIntervalId = null
    }

    releaseHintTemperatureAction(releasedAction)
    activeHintHoldAction = null
    activeHintHoldPointerId = null
    syncHintActionActive(releasedAction)
  }

  function startHintHold(action, pointerId) {
    stopHintHold()
    activeHintHoldAction = action
    activeHintHoldPointerId = pointerId
    syncHintActionActive(action)
    performHintAction(action)

    hintHoldTimeoutId = window.setTimeout(() => {
      if (activeHintHoldAction !== action || activeHintHoldPointerId !== pointerId) {
        return
      }

      hintHoldIntervalId = window.setInterval(() => {
        if (activeHintHoldAction !== action || activeHintHoldPointerId !== pointerId) {
          return
        }

        performHintAction(action, { isRepeat: true })
      }, hintHoldRepeatInterval)
    }, hintHoldStartDelay)
  }

  function blurSliderFocus() {
    if (document.activeElement === speedSlider || document.activeElement === temperatureSlider) {
      document.activeElement.blur()
    }
  }

  function setZoomMultiplier(nextValue) {
    zoomMultiplier = clamp(nextValue, minZoomMultiplier, maxZoomMultiplier)
    update()
  }

  function zoomAtPoint(nextValue, clientX = lastPointerX || width * 0.5, clientY = lastPointerY || height * 0.5) {
    const nextZoom = clamp(nextValue, minZoomMultiplier, maxZoomMultiplier)

    if (nextZoom === zoomMultiplier) {
      return
    }

    const currentAnchor = getCurrentAnchorPosition()
    const currentCenterX = width - currentAnchor.x
    const currentCenterY = height - currentAnchor.y
    const currentScale = state.temperatureScale * zoomMultiplier
    const nextScale = state.temperatureScale * nextZoom
    const scaleRatio = nextScale / currentScale
    const nextCenterX = clientX - (clientX - currentCenterX) * scaleRatio
    const nextCenterY = clientY - (clientY - currentCenterY) * scaleRatio

    hasCustomAnchor = true
    state.anchorX = width - nextCenterX
    state.targetAnchorX = state.anchorX
    state.anchorY = height - nextCenterY
    state.targetAnchorY = state.anchorY
    zoomMultiplier = nextZoom
    scheduleZoomTrailReset()
    update()
  }

  function updateParameter(key, input) {
    if (input.value === "") {
      return
    }

    const nextValue = parseParameterInputValue(input)

    if (!Number.isFinite(nextValue)) {
      return
    }

    if (classicPresetActive) {
      clearClassicPreset()
    }

    if (key === "x" || key === "y" || key === "z") {
      initialConditions[key] = nextValue
    } else {
      parameterOverrides[key] = true
      parameters[key] = nextValue
      state[key] = nextValue
    }

    resetSimulation()
    update()
  }

  function applyClassicLorenzPreset() {
    if (!classicPresetSnapshot) {
      classicPresetSnapshot = captureClassicPresetSnapshot()
    }

    setClassicPresetActive(true)
    initialConditions.x = 0.08
    initialConditions.y = 0
    initialConditions.z = 0
    parameters.sigma = 10
    parameters.rho = 28
    parameters.beta = 8 / 3
    parameterOverrides.sigma = true
    parameterOverrides.rho = true
    parameterOverrides.beta = true

    parameterInputs.x.value = formatParameterInputValue(parameterInputs.x, initialConditions.x)
    parameterInputs.y.value = formatParameterInputValue(parameterInputs.y, initialConditions.y)
    parameterInputs.z.value = formatParameterInputValue(parameterInputs.z, initialConditions.z)
    parameterInputs.sigma.value = formatParameterInputValue(parameterInputs.sigma, parameters.sigma)
    parameterInputs.rho.value = formatParameterInputValue(parameterInputs.rho, parameters.rho)
    parameterInputs.beta.value = formatParameterValue(parameters.beta, 4)

    resetSimulation()
    update()
  }

  function handleClassicPresetButtonClick() {
    if (classicPresetActive) {
      clearClassicPreset({ restoreSnapshot: true })
      classicPresetButton.blur()
      return
    }

    applyClassicLorenzPreset()
    classicPresetButton.blur()
  }

  function applySpeedFromPointer(clientX) {
    const rect = speedSlider.getBoundingClientRect()
    const progress = (clientX - rect.left) / rect.width
    setSpeedMultiplier(progressToSpeedMultiplier(progress))
  }

  function applyTemperatureFromPointer(clientX) {
    const rect = temperatureSlider.getBoundingClientRect()
    const progress = (clientX - rect.left) / rect.width
    setTemperature(progressToTemperature(progress))
  }

  function update() {
    const k = Number(slider.value)
    const rgb = kelvinToRGB(k)

    hintTemperatureValue.textContent = `(${k}K)`
    hintZoomValue.textContent = `(${formatZoomMultiplier()}x)`
    syncAttractor(k, rgb)
    updateTemperatureSliderUI()
    updateSpeedSliderUI()
    updateParameterSlidersUI()
    updateAnchor()
    updateMenuIntroOpacity()
  }

  function stepAttractor(iterations) {
    const baseDt = 0.005
    const simulationIterations = Math.max(0, Math.round(iterations))

    if (simulationIterations <= 0) {
      return
    }

    const drawIterations = Math.max(simulationIterations, minVisibleAttractorIterations)
    const dt = baseDt * (simulationIterations / drawIterations)
    const defaultAnchor = getDefaultAnchorTarget()
    const targetAnchor = hasPosition(state.targetAnchorX, state.targetAnchorY)
      ? { x: state.targetAnchorX, y: state.targetAnchorY }
      : defaultAnchor

    if (!hasPosition(state.anchorX, state.anchorY)) {
      state.anchorX = targetAnchor.x
      state.anchorY = targetAnchor.y
    }

    state.anchorX += (targetAnchor.x - state.anchorX) * 0.08
    state.anchorY += (targetAnchor.y - state.anchorY) * 0.08

    const centerX = state.anchorX
    const centerY = state.anchorY
    const cosRotation = Math.cos(state.rotation)
    const sinRotation = Math.sin(state.rotation)
    const isZoomTrailResetScheduled = zoomTrailResetTimeoutId !== null
    const shouldResetTrailForZoom = isZoomTrailResetScheduled || pendingZoomTrailReset
    const shouldResetTrailForPinch = activeSceneTouches.size >= 2 && !shouldResetTrailForZoom
    const shouldResetTrailForViewportChange = !shouldResetTrailForZoom
      && hasViewportChanged(centerX, centerY)
    const shouldResetTrail = (
      isDraggingAttractor ||
      shouldResetTrailForPinch ||
      shouldResetTrailForZoom ||
      shouldResetTrailForViewportChange
    )

    if (shouldResetTrail) {
      if (shouldResetTrailForZoom) {
        pendingZoomTrailReset = false
      }

      clearCanvas()
    } else {
      fillCanvasBackground(ctx, width, height, trailFadeAlpha)
    }

    ctx.lineWidth = trailLineWidth
    ctx.strokeStyle = state.stroke
    ctx.shadowBlur = 0 //was 18
    ctx.shadowColor = state.glow
    ctx.beginPath()
    const framePoints = new Float32Array(drawIterations * 2)

    for (let i = 0; i < drawIterations; i += 1) {
      const dx = state.sigma * (state.y - state.x)
      const dy = state.x * (state.rho - state.z) - state.y
      const dz = state.x * state.y - state.beta * state.z

      state.x += dx * dt
      state.y += dy * dt
      state.z += dz * dt

      const projectedX = state.x * state.scale
      const projectedY = state.z * state.scale - state.y * state.scale * 0.28
      const px = centerX + projectedX * cosRotation - projectedY * sinRotation
      const py = centerY + projectedX * sinRotation + projectedY * cosRotation
      const pointIndex = i * 2

      framePoints[pointIndex] = px
      framePoints[pointIndex + 1] = py

      if (i === 0) {
        ctx.moveTo(px, py)
      } else {
        ctx.lineTo(px, py)
      }
    }

    ctx.stroke()
    ctx.shadowBlur = 0
    recordRenderFrame(framePoints, state.stroke)
    syncRenderedViewport(centerX, centerY)
  }

  function animate(timestamp) {
    advanceSpeedIntro(timestamp)
    stepAttractor(state.speed)
    requestAnimationFrame(animate)
  }

  Object.entries(parameterInputs).forEach(([key, input]) => {
    const sliderControl = parameterSliders[key]?.slider
    const sliderValue = parameterSliders[key]?.value
    let activePointerId = null
    let pointerStartX = 0
    let pointerDidDrag = false

    input.addEventListener("input", () => {
      updateParameter(key, input)
    })

    input.addEventListener("pointerdown", (event) => {
      event.stopPropagation()
    })

    input.addEventListener("keydown", (event) => {
      if (event.code === "Enter") {
        event.preventDefault()
        input.blur()
        return
      }

      if (event.code === "Escape") {
        event.preventDefault()
        stopParameterInputEdit(key, { revert: true })
        sliderControl?.focus()
      }
    })

    input.addEventListener("blur", () => {
      stopParameterInputEdit(key)
    })

    sliderValue?.addEventListener("pointerdown", (event) => {
      event.stopPropagation()
    })

    sliderValue?.addEventListener("click", (event) => {
      if (sliderControl?.classList.contains("is-editing")) {
        return
      }

      event.preventDefault()
      event.stopPropagation()
      startParameterInputEdit(key)
    })

    sliderControl?.addEventListener("wheel", (event) => {
      if (sliderControl.classList.contains("is-editing")) {
        return
      }

      const deltaPixels = getWheelDeltaPixels(event)

      if (deltaPixels === 0) {
        return
      }

      event.preventDefault()
      event.stopPropagation()

      const direction = deltaPixels < 0 ? 1 : -1
      const wheelSteps = Math.max(1, Math.round(Math.abs(deltaPixels) / 40))
      const stepMultiplier = wheelSteps * (event.shiftKey ? parameterWheelStepBoost : 1)

      nudgeParameterInput(key, input, direction, stepMultiplier)
    }, { passive: false })

    sliderControl?.addEventListener("pointerdown", (event) => {
      if (event.target instanceof Element && event.target.closest("input")) {
        return
      }

      if (event.pointerType === "mouse" && event.button !== 0) {
        return
      }

      if (sliderControl.classList.contains("is-editing")) {
        return
      }

      activePointerId = event.pointerId
      pointerStartX = event.clientX
      pointerDidDrag = false
      sliderControl.setPointerCapture(event.pointerId)
      sliderControl.focus()
      event.preventDefault()
      pointerDidDrag = true
      setParameterFromSliderPointer(key, event.clientX)
    })

    sliderControl?.addEventListener("pointermove", (event) => {
      if (activePointerId !== event.pointerId) {
        return
      }

      if (event.buttons === 0 && event.pointerType !== "touch") {
        return
      }

      if (!pointerDidDrag && Math.abs(event.clientX - pointerStartX) < parameterSliderDragThreshold) {
        return
      }

      pointerDidDrag = true
      setParameterFromSliderPointer(key, event.clientX)
    })

    sliderControl?.addEventListener("pointerup", (event) => {
      if (activePointerId === event.pointerId) {
        activePointerId = null
        pointerStartX = 0
        pointerDidDrag = false
      }
    })

    sliderControl?.addEventListener("pointercancel", (event) => {
      if (activePointerId === event.pointerId) {
        activePointerId = null
        pointerStartX = 0
        pointerDidDrag = false
      }
    })

    sliderControl?.addEventListener("lostpointercapture", () => {
      activePointerId = null
      pointerStartX = 0
      pointerDidDrag = false
    })

    sliderControl?.addEventListener("keydown", (event) => {
      if (sliderControl.classList.contains("is-editing")) {
        return
      }

      if (event.code === "ArrowRight" || event.code === "ArrowUp") {
        event.preventDefault()
        event.stopPropagation()
        nudgeParameterInput(key, input, 1, event.shiftKey ? parameterWheelStepBoost : 1)
        return
      }

      if (event.code === "ArrowLeft" || event.code === "ArrowDown") {
        event.preventDefault()
        event.stopPropagation()
        nudgeParameterInput(key, input, -1, event.shiftKey ? parameterWheelStepBoost : 1)
      }
    })
  })
  greenFlowButton.addEventListener("click", () => {
    greenFlowLocked = !greenFlowLocked
    syncGreenFlowState()
    greenFlowButton.blur()
  })
  resetButton.addEventListener("click", () => {
    resetToInitialState()
    resetButton.blur()
  })
  screenshotButton.addEventListener("click", () => {
    void handleScreenshotButtonClick()
  })
  hideMenuButton.addEventListener("click", () => {
    setUiHidden(true)
  })
  menuToggleButton.addEventListener("click", () => {
    setUiHidden(false)
  })
  classicPresetButton.addEventListener("click", handleClassicPresetButtonClick)
  hint.addEventListener("pointerdown", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    const action = hintButton.dataset.action

    if (!holdableHintActions.has(action)) {
      return
    }

    if (event.pointerType === "mouse" && event.button !== 0) {
      return
    }

    event.preventDefault()
    hintButton.setPointerCapture?.(event.pointerId)
    startHintHold(action, event.pointerId)
  })
  hint.addEventListener("pointerup", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
    event.target.closest(".hint-key")?.blur()
  })
  hint.addEventListener("pointercancel", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
  })
  hint.addEventListener("lostpointercapture", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
  })
  hint.addEventListener("keydown", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    if (event.code !== "Enter" && event.code !== "Space") {
      return
    }

    hintButton.classList.add("is-active")
  })
  hint.addEventListener("keyup", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    if (event.code !== "Enter" && event.code !== "Space") {
      return
    }

    hintButton.classList.remove("is-active")
  })
  hint.addEventListener("focusout", (event) => {
    event.target.closest(".hint-key")?.classList.remove("is-active")
  })
  hint.addEventListener("click", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    const action = hintButton.dataset.action

    if (holdableHintActions.has(action) && event.detail !== 0) {
      hintButton.blur()
      return
    }

    performHintAction(action)
    releaseHintTemperatureAction(action)
    hintButton.blur()
  })

  slider.addEventListener("input", () => {
    if (!classicPresetActive) {
      clearDynamicOverrides()
    }

    update()
  })
  window.addEventListener("wheel", (event) => {
    if (isParameterControlTarget(event.target)) {
      return
    }

    event.preventDefault()

    const factor = event.deltaY < 0 ? zoomStepFactor : 1 / zoomStepFactor

    if (isUiTarget(event.target)) {
      const visibleAnchor = getVisibleAnchorPosition()
      zoomAtPoint(zoomMultiplier * factor, visibleAnchor.x, visibleAnchor.y)
      return
    }

    zoomAtPoint(zoomMultiplier * factor, event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerdown", (event) => {
    if (event.button !== 0 || !isSceneInteractionTarget(event.target)) {
      return
    }

    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (event.pointerType === "touch") {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        return
      }
    }

    const visibleAnchor = getVisibleAnchorPosition()

    isDraggingAttractor = true
    dragOffsetX = event.clientX - visibleAnchor.x
    dragOffsetY = event.clientY - visibleAnchor.y
    updateAnchorFromPointer(event.clientX, event.clientY)
  })
  window.addEventListener("pointermove", (event) => {
    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        event.preventDefault()
        return
      }
    }

    if (!isDraggingAttractor || (event.buttons & 1) !== 1) {
      return
    }

    updateAnchorFromPointer(event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerup", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if (event.button !== 0) {
      return
    }

    clearDragInteraction()
  })
  window.addEventListener("pointercancel", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    clearDragInteraction()
  })
  window.addEventListener("pointerleave", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if ((event.buttons & 1) === 1) {
      return
    }

    clearDragInteraction()
  })
  speedSlider.addEventListener("pointerdown", (event) => {
    activeSpeedPointerId = event.pointerId
    speedSlider.setPointerCapture(event.pointerId)
    applySpeedFromPointer(event.clientX)
    speedSlider.blur()
  })
  temperatureSlider.addEventListener("pointerdown", (event) => {
    activeTemperaturePointerId = event.pointerId
    temperatureSlider.setPointerCapture(event.pointerId)
    applyTemperatureFromPointer(event.clientX)
    temperatureSlider.blur()
  })
  speedSlider.addEventListener("pointermove", (event) => {
    if (activeSpeedPointerId !== event.pointerId) {
      return
    }

    if (event.buttons === 0 && event.pointerType !== "touch") {
      return
    }

    applySpeedFromPointer(event.clientX)
  })
  temperatureSlider.addEventListener("pointermove", (event) => {
    if (activeTemperaturePointerId !== event.pointerId) {
      return
    }

    if (event.buttons === 0 && event.pointerType !== "touch") {
      return
    }

    applyTemperatureFromPointer(event.clientX)
  })
  speedSlider.addEventListener("pointerup", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  temperatureSlider.addEventListener("pointerup", (event) => {
    if (activeTemperaturePointerId === event.pointerId) {
      activeTemperaturePointerId = null
    }
  })
  speedSlider.addEventListener("pointercancel", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  temperatureSlider.addEventListener("pointercancel", (event) => {
    if (activeTemperaturePointerId === event.pointerId) {
      activeTemperaturePointerId = null
    }
  })
  speedSlider.addEventListener("lostpointercapture", () => {
    activeSpeedPointerId = null
  })
  temperatureSlider.addEventListener("lostpointercapture", () => {
    activeTemperaturePointerId = null
  })
  speedSlider.addEventListener("keydown", (event) => {
    if (event.code === "ArrowUp" || event.code === "ArrowRight") {
      event.preventDefault()
      blurSliderFocus()
      nudgeSpeedMultiplier(1)
      return
    }

    if (event.code === "ArrowDown" || event.code === "ArrowLeft") {
      event.preventDefault()
      blurSliderFocus()
      nudgeSpeedMultiplier(-1)
    }
  })
  temperatureSlider.addEventListener("keydown", (event) => {
    if (event.code === "ArrowRight") {
      event.preventDefault()
      blurSliderFocus()
      nudgeTemperatureFromKey(event.code, event.repeat)
      return
    }

    if (event.code === "ArrowLeft") {
      event.preventDefault()
      blurSliderFocus()
      nudgeTemperatureFromKey(event.code, event.repeat)
    }
  })
  temperatureSlider.addEventListener("keyup", (event) => {
    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      releaseTemperatureKey(event.code)
    }
  })
  window.addEventListener("keydown", (event) => {
    if (event.target instanceof Element && event.target.closest(".hint-key")) {
      return
    }

    if (isKeyboardHintIgnoredTarget(event.target)) {
      return
    }

    getHintActionsForKeyboardEvent(event).forEach((action) => {
      setKeyboardHintActionActive(action, true)
    })
  }, true)
  window.addEventListener("keyup", (event) => {
    getHintActionsForKeyboardEvent(event).forEach((action) => {
      setKeyboardHintActionActive(action, false)
    })
  }, true)
  window.addEventListener("resize", resizeCanvas)
  ;["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
    window.addEventListener(eventName, (event) => {
      event.preventDefault()
    }, { passive: false })
  })
  window.addEventListener("blur", () => {
    stopHintHold()
    clearZoomTrailResetDebounce()
    const keyboardActionsToReset = Array.from(activeKeyboardHintActions)
    activeKeyboardHintActions.clear()
    keyboardActionsToReset.forEach((action) => {
      syncHintActionActive(action)
    })
    activeTemperatureKey = null
    temperatureKeyHoldStartedAt = 0
    activeSceneTouches.clear()
    syncPinchState()
    clearDragInteraction()
  })

  resizeCanvas()
  updateGreenFlowButtonUI()
  updateClassicPresetUI()
  update()
  requestAnimationFrame(animate)

  document.addEventListener("keydown", (event) => {
    if (event.defaultPrevented || isEditableTarget(event.target)) {
      return
    }

    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      event.preventDefault()
      nudgeTemperatureFromKey(event.code, event.repeat)

      return
    }

    if (event.code === "ArrowUp" || event.code === "ArrowDown") {
      event.preventDefault()
      nudgeSpeedMultiplier(event.code === "ArrowUp" ? 1 : -1)

      return
    }

    if (event.code === "KeyR") {
      event.preventDefault()
      resetToInitialState()
      return
    }

    if (event.code === "Space") {
      event.preventDefault()
      setUiHidden(!uiHidden)
      return
    }

    if (!event.altKey && !event.ctrlKey && !event.metaKey
      && (event.key === "+" || event.key === "=")) {
      event.preventDefault()
      zoomAtPoint(zoomMultiplier * zoomStepFactor)
      return
    }

    if (!event.altKey && !event.ctrlKey && !event.metaKey
      && (event.key === "-" || event.key === "_")) {
      event.preventDefault()
      zoomAtPoint(zoomMultiplier / zoomStepFactor)
    }
  })

  window.addEventListener("keydown", (event) => {
    if (event.code !== "Enter" || greenFlowHeld) {
      return
    }

    blurSliderFocus()
    event.preventDefault()
    greenFlowHeld = true
    syncGreenFlowState()
  }, true)

  window.addEventListener("keyup", (event) => {
    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      releaseTemperatureKey(event.code)
    }

    if (event.code !== "Enter" || !greenFlowHeld) {
      return
    }

    event.preventDefault()
    greenFlowHeld = false
    syncGreenFlowState()
  }, true)
</script>
