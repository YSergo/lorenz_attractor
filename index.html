<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenz attractor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>🦋</text>
    </svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: manrope;
    position: relative;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #050505;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: center;
    position: fixed;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    z-index: 1;
    width: min(calc(100vw - 28px), 420px);
    max-height: calc(100vh - 28px);
    overflow-y: auto;
    box-sizing: border-box;
    gap: 14px;
    touch-action: none;
    opacity: 0;
  }

  #attractor {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transform: rotate(180deg);
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: min(88vw, 420px);
  }

  .menu-toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    width: min(88vw, 420px);
  }

  #greenFlowButton {
    margin-right: auto;
  }

  .menu-button {
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.28);
    color: rgba(255, 255, 255, 0.58);
    padding: 10px 16px;
    font: inherit;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }

  .icon-button {
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    padding: 0;
    flex: 0 0 42px;
  }

  .icon-button svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .hiddenMenu {
    padding: 12px 12px;
    /* background: linear-gradient(to right, rgba(201, 201, 201, 0.062), rgb(177, 35, 56));
    border: 0; */
    /* background: linear-gradient(#e66465, #9198e5); */
    background-color: rgba(255, 255, 255, 0.08);
  }

  #menuToggleButton.is-glowing {
    animation: menu-toggle-glow 1s ease;
  }

  @keyframes menu-toggle-glow {
    0% {
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    50% {
      background: rgb(180, 180, 180);;
      color: rgba(191, 255, 208, 0.98);
      box-shadow: 0 0 18px rgb(180, 180, 180);
    }

    100% {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 rgba(191, 255, 208, 0);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
  }


  .menu-button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.24);
  }

  .menu-button:focus-visible {
    outline: none;
    border-color: rgba(255, 255, 255, 0.46);
    background: rgba(255, 255, 255, 0.14);
  }

  .menu-button.is-active {
    background: rgba(255, 255, 255, 0.52);
    border-color: rgba(95, 255, 146, 0.42);
    color: rgba(18, 20, 24, 0.7);
  }

  .temperature-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .temperature-slider-input {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
    opacity: 0;
    pointer-events: none;
  }

  .parameter-panel {
    width: min(88vw, 420px);
    box-sizing: border-box;
    padding: 14px 16px 16px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(0, 0, 0, 0.28);
    color: rgba(255, 255, 255, 0.72);
  }

  .parameter-panel-title {
    margin: 0 0 14px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.48);
  }

  .parameter-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 120px));
    justify-content: center;
    gap: 10px;
  }

  .parameter-actions {
    display: flex;
    justify-content: center;
    margin-top: 14px;
  }

  .preset-button {
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.48);
    padding: 10px 16px;
    font: inherit;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }

  .preset-button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.24);
  }

  .preset-button:focus-visible {
    outline: none;
    border-color: rgba(255, 255, 255, 0.46);
    background: rgba(255, 255, 255, 0.14);
  }

  .preset-button.is-active {
    background: rgba(255, 255, 255, 0.52);
    color: rgba(18, 20, 24, 0.7);
  }

  .parameter-field.is-active span {
    color: rgba(18, 20, 24, 0.7);
  }

  .parameter-field.is-active input {
    background: rgba(255, 255, 255, 0.52);
    color: rgba(18, 20, 24, 0.7);
  }

  .parameter-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    text-align: left;
  }

  .parameter-field span {
    font-size: 10px;
    line-height: 1.35;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.58);
  }

  .parameter-field input {
    width: 100%;
    -webkit-user-select: text;
    user-select: text;
    box-sizing: border-box;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.82);
    padding: 8px 10px;
    text-align: center;
    font: inherit;
  }

  .parameter-field input[type="number"] {
    appearance: textfield;
    -moz-appearance: textfield;
  }

  .parameter-field input::-webkit-outer-spin-button,
  .parameter-field input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .parameter-field input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.46);
    background: rgba(255, 255, 255, 0.12);
  }

  .ios-vertical-slider {
    position: relative;
    width: 188px;
    height: 42px;
    margin-bottom: 0;
    border: 0;
    padding: 0;
    border-radius: 34px;
    background: rgba(255, 255, 255, 0.12);
    overflow: hidden;
    touch-action: none;
  }

  .ios-vertical-slider:focus-visible {
    outline: none;
  }

  .ios-vertical-slider:focus {
    outline: none;
  }

  .ios-vertical-slider-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--fill-width, 25%);
    background: rgba(255, 255, 255, 0.52);
  }

  .ios-vertical-slider-icon {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    user-select: none;
    pointer-events: none;
    width: 100%;
    white-space: nowrap;
    text-align: center;
    font-size: 22px;
    font-family: 'Manrope', sans-serif;
    color: rgba(18, 20, 24, 0.7);
    mix-blend-mode: multiply;
  }

  .temperature-slider {
    width: 100%;
    height: 44px;
    margin-bottom: 0;
    cursor: pointer;
  }

  .speed-slider {
    width: 100%;
    height: 44px;
    margin-bottom: 0;
    cursor: pointer;
  }

  .temperature-slider .ios-vertical-slider-icon {
    font-size: 22px;
  }

  @media (max-width: 640px) {
    #app {
      align-items: center;
      position: relative;
      top: auto;
      right: auto;
      transform: none;
      width: min(92vw, 680px);
      max-height: none;
      overflow-y: visible;
    }

    .controls {
      width: 100%;
      max-width: 520px;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .menu-toolbar {
      width: 100%;
      max-width: 520px;
    }

    .temperature-control {
      width: 100%;
    }

    .parameter-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .temperature-slider {
      order: 4;
      margin-top: 0;
      width: 100%;
      height: 52px;
    }

    .speed-slider {
      width: 100%;
      height: 52px;
    }

    .parameter-panel {
      width: 100%;
      max-width: 520px;
      padding: 12px 12px 14px;
    }

    .parameter-panel-title {
      margin-bottom: 10px;
    }

    .parameter-field {
      gap: 4px;
    }

    .parameter-field span {
      font-size: 9px;
    }

    .parameter-field input {
      padding: 7px 8px;
      font-size: 16px;
      border-radius: 10px;
    }

    .ios-vertical-slider {
      height: 38px;
      flex: 0 0 auto;
    }
    
    #hint {
      display: none;
    }
  }

  .hidden,
  #app.hidden {
    display: none;
  }

  #hint {
    align-self: center;
    user-select: none;
    color: rgba(255, 255, 255, 0.68);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(0, 0, 0, 0.308);
    padding: 12px 14px;
    width: min(88vw, 310px);
    box-sizing: border-box;
    backdrop-filter: blur(16px);
  }

  .hint-grid {
    display: grid;
    grid-template-columns: 176px max-content;
    align-items: center;
    justify-content: center;
    column-gap: 6px;
    row-gap: 8px;
    width: fit-content;
    margin: 0 auto;
  }

  .hint-keys {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    min-width: 50px;
  }

  .hint-key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    appearance: none;
    min-height: 24px;
    padding: 0 7px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.72);
    font: inherit;
    font-size: 10px;
    line-height: 1;
    white-space: nowrap;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }

  .hint-key:hover {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(255, 255, 255, 0.28);
    color: rgba(255, 255, 255, 0.92);
  }

  .hint-key:focus-visible {
    outline: none;
    background: rgba(255, 255, 255, 0.16);
    border-color: rgba(255, 255, 255, 0.38);
    color: rgba(255, 255, 255, 0.96);
  }

  .hint-key.is-active,
  .hint-key.is-active:hover,
  .hint-key.is-active:focus-visible {
    background: rgba(255, 255, 255, 0.52);
    color: rgba(18, 20, 24, 0.7);
  }

  .hint-label {
    width: 176px;
    font-size: 12px;
    line-height: 1.25;
    text-align: left;
    color: rgba(255, 255, 255, 0.72);
    white-space: nowrap;
  }

  .hint-value {
    display: inline-block;
    min-width: 8ch;
    color: rgba(255, 255, 255, 0.46);
    text-align: left;
  }

  #menuToggleButton {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 2;
    opacity: 0;
  }

</style>

<body>
  <canvas id="attractor"></canvas>
  <div id="app">
    <div class="menu-toolbar">
      <button id="greenFlowButton" class="menu-button" type="button" aria-pressed="false">green flow</button>
      <button id="resetButton" class="menu-button icon-button" type="button" aria-label="Reset scene" title="Reset scene">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 5v4h4"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 19v-4h-4"></path>
        </svg>
      </button>
      <button id="hideMenuButton" class="menu-button" type="button">hide menu</button>
    </div>
    <div class="controls">
      <div class="temperature-control">
        <input class="temperature-slider-input" type="range" min="100" max="44444" value="3000" id="slider" tabindex="-1"
          aria-hidden="true">
        <button id="temperatureSlider" class="ios-vertical-slider temperature-slider" type="button" role="slider"
          aria-label="color temperature" aria-orientation="horizontal" aria-valuemin="100" aria-valuemax="44444"
          aria-valuenow="3000">
          <div id="temperatureSliderFill" class="ios-vertical-slider-fill"></div>
          <div id="temperatureSliderLabel" class="ios-vertical-slider-icon">3000K</div>
        </button>
      </div>
      <button id="speedSlider" class="ios-vertical-slider speed-slider" type="button" role="slider" aria-label="Animation speed"
        aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="50" aria-valuenow="1">
        <div id="speedSliderFill" class="ios-vertical-slider-fill"></div>
        <div id="speedSliderLabel" class="ios-vertical-slider-icon">speed</div>
      </button>
    </div>
    <div class="parameter-panel">
      <div class="parameter-panel-title">System variables</div>
      <div class="parameter-grid">
        <label class="parameter-field">
          <span>sigma (σ)</span>
          <input id="paramSigma" type="number" step="0.1" min="0.1" value="10" inputmode="decimal">
        </label>
        <label class="parameter-field">
          <span>rho (ρ)</span>
          <input id="paramRho" type="number" step="0.1" value="28" inputmode="decimal">
        </label>
        <label class="parameter-field">
          <span>beta (β)</span>
          <input id="paramBeta" type="number" step="0.01" min="0.01" value="2.67" inputmode="decimal">
        </label>
        <label class="parameter-field">
          <span>x start</span>
          <input id="paramX" type="number" step="0.01" value="0.08" inputmode="decimal">
        </label>
        <label class="parameter-field">
          <span>y start</span>
          <input id="paramY" type="number" step="0.01" value="0" inputmode="decimal">
        </label>
        <label class="parameter-field">
          <span>z start</span>
          <input id="paramZ" type="number" step="0.01" value="0" inputmode="decimal">
        </label>
      </div>
      <div class="parameter-actions">
        <button id="classicPresetButton" class="preset-button" type="button">Classic Lorenz</button>
      </div>
    </div>
    <div id="hint">
      <div class="hint-grid">
        <div class="hint-label">reset scene</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="reset">R</button></div>
        <div class="hint-label">toggle UI</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="toggle-ui">Space</button></div>
        <div class="hint-label">green flow</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="green-flow">Enter</button></div>
        <div class="hint-label">temperature <span id="hintTemperatureValue" class="hint-value">(3000K)</span></div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="temperature-down">&larr;</button><button class="hint-key" type="button" data-action="temperature-up">&rarr;</button></div>
        <div class="hint-label">speed</div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="speed-up">&uarr;</button><button class="hint-key" type="button" data-action="speed-down">&darr;</button></div>
        <div class="hint-label">zoom <span id="hintZoomValue" class="hint-value">(1x)</span></div>
        <div class="hint-keys"><button class="hint-key" type="button" data-action="zoom-in">Wheel</button><button class="hint-key" type="button" data-action="zoom-out">+/-</button></div>
      </div>
    </div>
  </div>
  <button id="menuToggleButton" class="menu-button hidden hiddenMenu" type="button"></button>
</body>
<script>
  const app = document.getElementById("app")
  const slider = document.getElementById("slider")
  const temperatureSlider = document.getElementById("temperatureSlider")
  const temperatureSliderFill = document.getElementById("temperatureSliderFill")
  const temperatureSliderLabel = document.getElementById("temperatureSliderLabel")
  const speedSlider = document.getElementById("speedSlider")
  const speedSliderFill = document.getElementById("speedSliderFill")
  const speedSliderLabel = document.getElementById("speedSliderLabel")
  const greenFlowButton = document.getElementById("greenFlowButton")
  const resetButton = document.getElementById("resetButton")
  const hideMenuButton = document.getElementById("hideMenuButton")
  const menuToggleButton = document.getElementById("menuToggleButton")
  const classicPresetButton = document.getElementById("classicPresetButton")
  const hint = document.getElementById("hint")
  const hintTemperatureValue = document.getElementById("hintTemperatureValue")
  const hintZoomValue = document.getElementById("hintZoomValue")
  const canvas = document.getElementById("attractor")
  const ctx = canvas.getContext("2d")
  const parameterInputs = {
    x: document.getElementById("paramX"),
    y: document.getElementById("paramY"),
    z: document.getElementById("paramZ"),
    sigma: document.getElementById("paramSigma"),
    rho: document.getElementById("paramRho"),
    beta: document.getElementById("paramBeta"),
  }
  const minSpeedMultiplier = 0
  const minActiveSpeedMultiplier = 0.003
  const maxSpeedMultiplier = 50
  const speedSliderEdgeThreshold = 0.002
  const speedSliderStopZone = 0.012
  const speedSliderCurveExponent = 1
  const defaultSpeedMultiplier = 1
  const speedIntroDuration = 2200
  const menuIntroMinOpacity = 0
  const baseTemperatureStep = 1
  const temperatureStepAccelerationInterval = 60
  const maxTemperatureStepMultiplier = 1000
  const minZoomMultiplier = 0.01
  const maxZoomMultiplier = 1000
  const hintHoldStartDelay = 260
  const hintHoldRepeatInterval = 45
  const holdableHintActions = new Set(["temperature-down", "temperature-up", "speed-up", "speed-down"])
  const baseTemperature = Number(slider.value)
  const baseNormalized = (baseTemperature - 1000) / 9000
  const baseScale = 11 + baseNormalized * 18

  let width = 0
  let height = 0
  let pixelRatio = 1
  let uiHidden = false
  let speedMultiplier = minActiveSpeedMultiplier
  let zoomMultiplier = getDefaultZoomMultiplier()
  let greenBoost = false
  let greenFlowLocked = false
  let greenFlowHeld = false
  let classicPresetActive = false
  let isDraggingAttractor = false
  let hasCustomAnchor = false
  let dragOffsetX = 0
  let dragOffsetY = 0
  let lastPointerX = 0
  let lastPointerY = 0
  let speedIntroActive = true
  let speedIntroStartedAt = null
  let menuIntroActive = true
  let activeTemperatureKey = null
  let temperatureKeyHoldStartedAt = 0
  let activeSpeedPointerId = null
  let activeTemperaturePointerId = null
  let pinchLastDistance = 0
  let pinchLastCenterX = 0
  let pinchLastCenterY = 0
  let pinchLastAngle = 0
  let menuToggleGlowTimeoutId = null
  let activeHintHoldAction = null
  let activeHintHoldPointerId = null
  let hintHoldTimeoutId = null
  let hintHoldIntervalId = null
  const activeKeyboardHintActions = new Set()

  const activeSceneTouches = new Map()

  const state = {
    x: 0.08,
    y: 0,
    z: 0,
    hue: 30,
    stroke: "rgba(255, 224, 176, 0.28)",
    glow: "rgba(255, 224, 176, 0.18)",
    temperatureScale: 14,
    scale: 14,
    speed: 2400,
    sigma: 10,
    rho: 28,
    beta: 8 / 3,
    rotation: 0,
    anchorX: 0,
    anchorY: 0,
    targetAnchorX: 0,
    targetAnchorY: 0,
  }

  function getTemperatureDynamics(k) {
    const normalized = (Number(k) - 1000) / 9000

    return {
      normalized,
      sigma: 8 + normalized * 10,
      rho: 18 + normalized * 22,
      beta: 1.8 + normalized * 1.4,
    }
  }

  function formatParameterValue(value, fractionDigits = 2) {
    return Number(value.toFixed(fractionDigits)).toString()
  }

  function getDefaultZoomMultiplier() {
    return window.matchMedia("(max-width: 640px)").matches ? 0.7 : 1
  }

  const defaultInitialConditions = {
    x: Number(parameterInputs.x.value),
    y: Number(parameterInputs.y.value),
    z: Number(parameterInputs.z.value),
  }
  const initialConditions = { ...defaultInitialConditions }

  const defaultDynamics = getTemperatureDynamics(baseTemperature)
  const defaultParameters = {
    sigma: defaultDynamics.sigma,
    rho: defaultDynamics.rho,
    beta: defaultDynamics.beta,
  }
  const parameters = { ...defaultParameters }
  const parameterOverrides = {
    sigma: false,
    rho: false,
    beta: false,
  }

  parameterInputs.sigma.value = formatParameterValue(parameters.sigma)
  parameterInputs.rho.value = formatParameterValue(parameters.rho)
  parameterInputs.beta.value = formatParameterValue(parameters.beta)

  state.x = initialConditions.x
  state.y = initialConditions.y
  state.z = initialConditions.z
  state.sigma = parameters.sigma
  state.rho = parameters.rho
  state.beta = parameters.beta

  function hasPosition(x, y) {
    return x !== 0 || y !== 0
  }

  function getDefaultAnchorTarget() {
    return {
      x: width * 0.5,
      y: height * 0.18,
    }
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, width, height)
    ctx.fillStyle = "rgba(0, 0, 0, 1)"
    ctx.fillRect(0, 0, width, height)
  }

  function isEditableTarget(target) {
    return target instanceof HTMLElement && (
      target.isContentEditable ||
      target.closest("input, textarea, select, button, [contenteditable='true']") !== null
    )
  }

  function isKeyboardHintIgnoredTarget(target) {
    return target instanceof HTMLElement && (
      target.isContentEditable ||
      target.closest("input, textarea, select, [contenteditable='true']") !== null
    )
  }

  function isSceneInteractionTarget(target) {
    return !(target instanceof Element && target.closest("#app, #menuToggleButton"))
  }

  function clearDragInteraction() {
    isDraggingAttractor = false
    dragOffsetX = 0
    dragOffsetY = 0

    const dy = secondTouch.y - firstTouch.y

    return {
      centerX: (firstTouch.x + secondTouch.x) * 0.5,

    if (pinchLastDistance === 0) {

      pinchLastCenterY = pinchMetrics.centerY

      const nextCenterY = pinchMetrics.centerY + rotatedOffsetY

      state.rotation += rotationDelta

    pinchLastCenterX = pinchMetrics.centerX
    pinchLastCenterY = pinchMetrics.centerY
    pinchLastAngle = pinchMetrics.angle

    if (endProgress <= startProgress) {

      1

  function updateMenuIntroOpacity() {

    const opacityText = introOpacity.toFixed(3)

    updateGreenFlowButtonUI()

    if (hasChanged) {

  }

    classicPresetButton.setAttribute("aria-pressed", String(classicPresetActive))
    parameterInputs.sigma.closest(".parameter-field")?.classList.toggle("is-active", classicPresetActive)
    parameterInputs.rho.closest(".parameter-field")?.classList.toggle("is-active", classicPresetActive)
    parameterInputs.beta.closest(".parameter-field")?.classList.toggle("is-active", classicPresetActive)
  }

    parameterOverrides.rho = false

    speedMultiplier = minActiveSpeedMultiplier
    speedIntroActive = true
    speedIntroStartedAt = null
    zoomMultiplier = getDefaultZoomMultiplier()
    greenFlowLocked = false
    greenFlowHeld = false
    greenBoost = false
    activeTemperatureKey = null
    temperatureKeyHoldStartedAt = 0
    activeSpeedPointerId = null
    activeTemperaturePointerId = null
    activeSceneTouches.clear()

    lastPointerX = width * 0.5
    lastPointerY = height * 0.5

    initialConditions.y = defaultInitialConditions.y
    initialConditions.z = defaultInitialConditions.z
    parameters.sigma = defaultParameters.sigma
    parameters.rho = defaultParameters.rho
    parameters.beta = defaultParameters.beta

    parameterInputs.y.value = formatParameterValue(defaultInitialConditions.y)
    parameterInputs.z.value = formatParameterValue(defaultInitialConditions.z)
    parameterInputs.sigma.value = formatParameterValue(defaultParameters.sigma)
    parameterInputs.rho.value = formatParameterValue(defaultParameters.rho)
    parameterInputs.beta.value = formatParameterValue(defaultParameters.beta)

    setClassicPresetActive(false)
    updateGreenFlowButtonUI()
    clearDragInteraction()
    hasCustomAnchor = false
    state.rotation = 0
    state.anchorX = 0
    state.anchorY = 0
    state.targetAnchorX = 0
    state.targetAnchorY = 0
    setUiHidden(false)
    resetSimulation()
    update()
  }

  function resizeCanvas() {

    height = window.innerHeight

    canvas.height = Math.round(height * pixelRatio)

    ctx.fillStyle = "rgba(0, 0, 0, 0.08)"

    lastPointerX = width * 0.5
    lastPointerY = height * 0.5

    state.targetAnchorX = defaultAnchor.x
    state.targetAnchorY = defaultAnchor.y

    state.targetAnchorY = height - (clientY - dragOffsetY) + scaleCompensation

        x: state.anchorX,
        y: state.anchorY,

    if (hasTargetAnchor) {

        y: state.targetAnchorY,

    }

    return {

      y: defaultAnchor.y,

  }

  function kelvinToRGB(k) {

    let temp = k / 100
    let r, g, b

    if (temp <= 66) {

      g = temp
      g = 99.47 * Math.log(g) - 161.12
      b = temp <= 19 ? 0 : 138.52 * Math.log(temp - 10) - 305.04
    } else {
      r = 329.7 * Math.pow(temp - 60, -0.133)
      g = 288.12 * Math.pow(temp - 60, -0.0755)
      b = 255
    }

    r = Math.min(255, Math.max(0, r))
    g = Math.min(255, Math.max(0, g))
    b = Math.min(255, Math.max(0, b))

    return {
      r: Math.round(r),
      g: Math.round(g),
      b: Math.round(b),
    }
  }

  function rgbToHsl({ r, g, b }) {
    const rn = r / 255
    const gn = g / 255
    const bn = b / 255
    const max = Math.max(rn, gn, bn)
    const min = Math.min(rn, gn, bn)
    const delta = max - min
    let hue = 0

    if (delta !== 0) {
      if (max === rn) {
        hue = ((gn - bn) / delta) % 6
      } else if (max === gn) {
        hue = (bn - rn) / delta + 2
      } else {
        hue = (rn - gn) / delta + 4
      }
    }

    return {
      h: Math.round(hue * 60 < 0 ? hue * 60 + 360 : hue * 60),
    }
  }

    const { normalized, sigma, rho, beta } = getTemperatureDynamics(k)
    const { h } = rgbToHsl(rgb)
    const strokeHue = greenBoost ? 135 : h
    const glowHue = greenBoost ? 145 : h

    state.hue = h
    state.stroke = `hsla(${strokeHue}, 90%, ${greenBoost ? 58 : 65 - normalized * 18}%, ${greenBoost ? 0.34 : 0.28})`
    state.glow = `hsla(${glowHue}, 100%, ${greenBoost ? 60 : 70 - normalized * 14}%, ${greenBoost ? 0.24 : 0.18})`
    state.temperatureScale = 11 + normalized * 18
    state.scale = state.temperatureScale * zoomMultiplier
    state.speed = Math.round((800 + normalized * 3800) * speedMultiplier)
    state.sigma = parameterOverrides.sigma ? parameters.sigma : sigma
    state.rho = parameterOverrides.rho ? parameters.rho : rho
    state.beta = parameterOverrides.beta ? parameters.beta : beta

    if (!parameterOverrides.sigma) {
      parameters.sigma = sigma
      parameterInputs.sigma.value = formatParameterValue(sigma)
    }

    if (!parameterOverrides.rho) {
      parameters.rho = rho
      parameterInputs.rho.value = formatParameterValue(rho)
    }

    if (!parameterOverrides.beta) {
      parameters.beta = beta
      parameterInputs.beta.value = formatParameterValue(beta)

  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value))
  }

  function speedMultiplierToProgress(multiplier) {

    if (clampedMultiplier <= minSpeedMultiplier) {

    }

    const minLog = Math.log(minActiveSpeedMultiplier)
    const maxLog = Math.log(maxSpeedMultiplier)
    const currentLog = Math.log(clamp(clampedMultiplier, minActiveSpeedMultiplier, maxSpeedMultiplier))
    const normalizedValue = (currentLog - minLog) / (maxLog - minLog)

    return speedSliderStopZone + (1 - speedSliderStopZone) * normalizedValue
  }

  function progressToSpeedMultiplier(progress) {
    const safeProgress = clamp(progress, 0, 1)

    if (safeProgress <= speedSliderStopZone) {
      return minSpeedMultiplier
    }

    const normalizedProgress = (safeProgress - speedSliderStopZone) / (1 - speedSliderStopZone)
    const minLog = Math.log(minActiveSpeedMultiplier)
    const maxLog = Math.log(maxSpeedMultiplier)

    return Math.exp(minLog + (maxLog - minLog) * Math.pow(normalizedProgress, speedSliderCurveExponent))

  function formatSpeedMultiplier() {
    if (speedMultiplier <= minSpeedMultiplier) {

    if (speedMultiplier <= minActiveSpeedMultiplier) {

    const progress = speedMultiplierToProgress(speedMultiplier)

  }

  function temperatureToProgress(value) {
    const min = Number(slider.min)
    const max = Number(slider.max)

    return (clamp(Number(value), min, max) - min) / (max - min)
  }

  function progressToTemperature(progress) {
    const min = Number(slider.min)
    const max = Number(slider.max)
    const safeProgress = clamp(progress, 0, 1)

    return Math.round(min + (max - min) * safeProgress)
  }

  function updateTemperatureSliderUI() {
    const value = Number(slider.value)
    const fillWidth = Math.max(0, temperatureToProgress(value) * 100)

    temperatureSliderFill.style.setProperty("--fill-width", fillWidth + "%")
    temperatureSliderLabel.textContent = `${value}K`
    temperatureSlider.setAttribute("aria-valuenow", value.toString())
    temperatureSlider.setAttribute("aria-valuetext", value + " kelvin")
  }

  function updateSpeedSliderUI() {
    const progress = speedMultiplierToProgress(speedMultiplier)
    const fillWidth = Math.max(0, progress * 100)
    const formattedSpeed = formatSpeedMultiplier()
    const speedValueText = formattedSpeed === "min" || formattedSpeed === "max"
      ? formattedSpeed
      : formattedSpeed + "x"

    speedSliderFill.style.setProperty("--fill-width", fillWidth + "%")
    speedSliderLabel.textContent = "speed"
    speedSlider.setAttribute("aria-valuenow", Number(speedMultiplier.toFixed(3)).toString())
    speedSlider.setAttribute("aria-valuetext", speedValueText)
  }

  function setSpeedMultiplier(nextValue, { cancelIntro = true } = {}) {

      speedIntroStartedAt = null

    const progress = clamp((timestamp - speedIntroStartedAt) / speedIntroDuration, 0, 1)
    const easedProgress = Math.pow(progress, 20)
    const nextSpeed = minActiveSpeedMultiplier
      + (defaultSpeedMultiplier - minActiveSpeedMultiplier) * easedProgress

    setSpeedMultiplier(nextSpeed, { cancelIntro: false })

    if (progress >= 1) {

      speedIntroStartedAt = null
      setSpeedMultiplier(defaultSpeedMultiplier, { cancelIntro: false })
    }
  }

  function setTemperature(nextValue) {
    const min = Number(slider.min)
    const max = Number(slider.max)

    slider.value = Math.round(clamp(nextValue, min, max)).toString()
    setClassicPresetActive(false)
    clearDynamicOverrides()
    update()
  }

  function getTemperatureStepForKey(code, isRepeat) {

    if (!isRepeat) {

    const heldDuration = now - temperatureKeyHoldStartedAt

    })

  function setKeyboardHintActionActive(action, isActive) {
    if (!action) {

    }

    } else {

    }

  }

  function getHintActionsForKeyboardEvent(event) {
    const actions = []

    if (event.code === "KeyR") {

    }

    if (event.code === "Space") {
      actions.push("toggle-ui")
    }

    if (event.code === "Enter") {
      actions.push("green-flow")
    }

    if (event.code === "ArrowLeft") {
      actions.push("temperature-down")
    }

    if (event.code === "ArrowRight") {
      actions.push("temperature-up")
    }

    if (event.code === "ArrowUp") {
      actions.push("speed-up")
    }

    if (event.code === "ArrowDown") {
      actions.push("speed-down")
    }

      parameters[key] = nextValue
      state[key] = nextValue

    update()
  }

  function applyClassicLorenzPreset() {
    setClassicPresetActive(true)
    initialConditions.x = 0.08
    initialConditions.y = 0
    initialConditions.z = 0
    parameters.sigma = 10
    parameters.rho = 28
    parameters.beta = 8 / 3
    parameterOverrides.sigma = true
    parameterOverrides.rho = true
    parameterOverrides.beta = true

    parameterInputs.x.value = formatParameterValue(initialConditions.x)
    parameterInputs.y.value = formatParameterValue(initialConditions.y)
    parameterInputs.z.value = formatParameterValue(initialConditions.z)
    parameterInputs.sigma.value = formatParameterValue(parameters.sigma)
    parameterInputs.rho.value = formatParameterValue(parameters.rho)
    parameterInputs.beta.value = formatParameterValue(parameters.beta, 4)

    resetSimulation()
    update()
  }

  function handleClassicPresetButtonClick() {
    if (classicPresetActive) {
      setClassicPresetActive(false)
      classicPresetButton.blur()
      return
    }

    applyClassicLorenzPreset()
    classicPresetButton.blur()
  }

  function applySpeedFromPointer(clientX) {
    const rect = speedSlider.getBoundingClientRect()
    const progress = (clientX - rect.left) / rect.width
    setSpeedMultiplier(progressToSpeedMultiplier(progress))
  }

  function applyTemperatureFromPointer(clientX) {
    const rect = temperatureSlider.getBoundingClientRect()
    const progress = (clientX - rect.left) / rect.width
    setTemperature(progressToTemperature(progress))
  }

  function update() {
    const k = Number(slider.value)
    const rgb = kelvinToRGB(k)

    hintTemperatureValue.textContent = `(${k}K)`
    hintZoomValue.textContent = `(${formatZoomMultiplier()}x)`
    syncAttractor(k, rgb)
    updateTemperatureSliderUI()
    updateSpeedSliderUI()
    updateAnchor()
    updateMenuIntroOpacity()
  }

  function stepAttractor(iterations) {
    const dt = 0.005
    const defaultAnchor = getDefaultAnchorTarget()
    const targetAnchor = hasPosition(state.targetAnchorX, state.targetAnchorY)
      ? { x: state.targetAnchorX, y: state.targetAnchorY }
      : defaultAnchor

    if (!hasPosition(state.anchorX, state.anchorY)) {
      state.anchorX = targetAnchor.x
      state.anchorY = targetAnchor.y
    }

    state.anchorX += (targetAnchor.x - state.anchorX) * 0.08
    state.anchorY += (targetAnchor.y - state.anchorY) * 0.08

    const centerX = state.anchorX
    const scaleCompensation = (state.temperatureScale - baseScale) * 30
    const centerY = state.anchorY - scaleCompensation
    const cosRotation = Math.cos(state.rotation)
    const sinRotation = Math.sin(state.rotation)

    ctx.fillStyle = "rgba(0, 0, 0, 0.045)"
    ctx.fillRect(0, 0, width, height)
    ctx.lineWidth = 1.1
    ctx.strokeStyle = state.stroke
    ctx.shadowBlur = 18
    ctx.shadowColor = state.glow
    ctx.beginPath()

    for (let i = 0; i < iterations; i += 1) {
      const dx = state.sigma * (state.y - state.x)
      const dy = state.x * (state.rho - state.z) - state.y
      const dz = state.x * state.y - state.beta * state.z

      state.x += dx * dt
      state.y += dy * dt
      state.z += dz * dt

      const projectedX = state.x * state.scale
      const projectedY = state.z * state.scale - state.y * state.scale * 0.28
      const px = centerX + projectedX * cosRotation - projectedY * sinRotation
      const py = centerY + projectedX * sinRotation + projectedY * cosRotation

      if (i === 0) {
        ctx.moveTo(px, py)
      } else {
        ctx.lineTo(px, py)
      }
    }

    ctx.stroke()
    ctx.shadowBlur = 0
  }

  function animate(timestamp) {
    advanceSpeedIntro(timestamp)
    stepAttractor(state.speed)
    requestAnimationFrame(animate)
  }

  Object.entries(parameterInputs).forEach(([key, input]) => {
    input.addEventListener("input", () => {
      updateParameter(key, input)
    })
  })
  greenFlowButton.addEventListener("click", () => {
    greenFlowLocked = !greenFlowLocked
    syncGreenFlowState()
    greenFlowButton.blur()
  })
  resetButton.addEventListener("click", () => {
    resetToInitialState()
    resetButton.blur()
  })
  hideMenuButton.addEventListener("click", () => {
    setUiHidden(true)
  })
  menuToggleButton.addEventListener("click", () => {
    setUiHidden(false)
  })
  classicPresetButton.addEventListener("click", handleClassicPresetButtonClick)
  hint.addEventListener("pointerdown", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    const action = hintButton.dataset.action

    if (!holdableHintActions.has(action)) {
      return
    }

    if (event.pointerType === "mouse" && event.button !== 0) {
      return
    }

    event.preventDefault()
    hintButton.setPointerCapture?.(event.pointerId)
    startHintHold(action, event.pointerId)
  })
  hint.addEventListener("pointerup", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
    event.target.closest(".hint-key")?.blur()
  })
  hint.addEventListener("pointercancel", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
  })
  hint.addEventListener("lostpointercapture", (event) => {
    if (activeHintHoldPointerId !== event.pointerId) {
      return
    }

    stopHintHold()
  })
  hint.addEventListener("keydown", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    if (event.code !== "Enter" && event.code !== "Space") {
      return
    }

    hintButton.classList.add("is-active")
  })
  hint.addEventListener("keyup", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    if (event.code !== "Enter" && event.code !== "Space") {
      return
    }

    hintButton.classList.remove("is-active")
  })
  hint.addEventListener("focusout", (event) => {
    event.target.closest(".hint-key")?.classList.remove("is-active")
  })
  hint.addEventListener("click", (event) => {
    const hintButton = event.target.closest(".hint-key")

    if (!hintButton) {
      return
    }

    const action = hintButton.dataset.action

    if (holdableHintActions.has(action) && event.detail !== 0) {
      hintButton.blur()
      return
    }

    performHintAction(action)
    releaseHintTemperatureAction(action)
    hintButton.blur()
  })

  slider.addEventListener("input", () => {
    setClassicPresetActive(false)
    clearDynamicOverrides()
    update()
  })
  window.addEventListener("wheel", (event) => {
    event.preventDefault()

    const factor = event.deltaY < 0 ? 1.08 : 1 / 1.08
    zoomAtPoint(zoomMultiplier * factor, event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerdown", (event) => {
    if (event.button !== 0 || !isSceneInteractionTarget(event.target)) {
      return
    }

    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (event.pointerType === "touch") {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        return
      }
    }

    const visibleAnchor = getVisibleAnchorPosition()

    isDraggingAttractor = true
    dragOffsetX = event.clientX - visibleAnchor.x
    dragOffsetY = event.clientY - visibleAnchor.y
    updateAnchorFromPointer(event.clientX, event.clientY)
  })
  window.addEventListener("pointermove", (event) => {
    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        event.preventDefault()
        return
      }
    }

    if (!isDraggingAttractor || (event.buttons & 1) !== 1) {
      return
    }

    updateAnchorFromPointer(event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerup", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if (event.button !== 0) {
      return
    }

    clearDragInteraction()
  })
  window.addEventListener("pointercancel", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    clearDragInteraction()
  })
  window.addEventListener("pointerleave", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if ((event.buttons & 1) === 1) {
      return
    }

    clearDragInteraction()
  })
  speedSlider.addEventListener("pointerdown", (event) => {
    activeSpeedPointerId = event.pointerId
    speedSlider.setPointerCapture(event.pointerId)
    applySpeedFromPointer(event.clientX)
    speedSlider.blur()
  })
  temperatureSlider.addEventListener("pointerdown", (event) => {
    activeTemperaturePointerId = event.pointerId
    temperatureSlider.setPointerCapture(event.pointerId)
    applyTemperatureFromPointer(event.clientX)
    temperatureSlider.blur()
  })
  speedSlider.addEventListener("pointermove", (event) => {
    if (activeSpeedPointerId !== event.pointerId) {
      return
    }

    if (event.buttons === 0 && event.pointerType !== "touch") {
      return
    }

    applySpeedFromPointer(event.clientX)
  })
  temperatureSlider.addEventListener("pointermove", (event) => {
    if (activeTemperaturePointerId !== event.pointerId) {
      return
    }

    if (event.buttons === 0 && event.pointerType !== "touch") {
      return
    }

    applyTemperatureFromPointer(event.clientX)
  })
  speedSlider.addEventListener("pointerup", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  temperatureSlider.addEventListener("pointerup", (event) => {
    if (activeTemperaturePointerId === event.pointerId) {
      activeTemperaturePointerId = null
    }
  })
  speedSlider.addEventListener("pointercancel", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  temperatureSlider.addEventListener("pointercancel", (event) => {
    if (activeTemperaturePointerId === event.pointerId) {
      activeTemperaturePointerId = null
    }
  })
  speedSlider.addEventListener("lostpointercapture", () => {
    activeSpeedPointerId = null
  })
  temperatureSlider.addEventListener("lostpointercapture", () => {
    activeTemperaturePointerId = null
  })
  speedSlider.addEventListener("keydown", (event) => {
    if (event.code === "ArrowUp" || event.code === "ArrowRight") {
      event.preventDefault()
      blurSliderFocus()
      nudgeSpeedMultiplier(1)
      return
    }

    if (event.code === "ArrowDown" || event.code === "ArrowLeft") {
      event.preventDefault()
      blurSliderFocus()
      nudgeSpeedMultiplier(-1)
    }
  })
  temperatureSlider.addEventListener("keydown", (event) => {
    if (event.code === "ArrowRight") {
      event.preventDefault()
      blurSliderFocus()
      nudgeTemperatureFromKey(event.code, event.repeat)
      return
    }

    if (event.code === "ArrowLeft") {
      event.preventDefault()
      blurSliderFocus()
      nudgeTemperatureFromKey(event.code, event.repeat)
    }
  })
  temperatureSlider.addEventListener("keyup", (event) => {
    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      releaseTemperatureKey(event.code)
    }
  })
  window.addEventListener("keydown", (event) => {
    if (event.target instanceof Element && event.target.closest(".hint-key")) {
      return
    }

    if (isKeyboardHintIgnoredTarget(event.target)) {
      return
    }

    getHintActionsForKeyboardEvent(event).forEach((action) => {
      setKeyboardHintActionActive(action, true)
    })
  }, true)
  window.addEventListener("keyup", (event) => {
    getHintActionsForKeyboardEvent(event).forEach((action) => {
      setKeyboardHintActionActive(action, false)
    })
  }, true)
  window.addEventListener("resize", resizeCanvas)
  ;["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
    window.addEventListener(eventName, (event) => {
      event.preventDefault()
    }, { passive: false })
  })
  window.addEventListener("blur", () => {
    stopHintHold()
    const keyboardActionsToReset = Array.from(activeKeyboardHintActions)
    activeKeyboardHintActions.clear()
    keyboardActionsToReset.forEach((action) => {
      syncHintActionActive(action)
    })
    activeTemperatureKey = null
    temperatureKeyHoldStartedAt = 0
    activeSceneTouches.clear()
    syncPinchState()
    clearDragInteraction()
  })

  resizeCanvas()
  updateGreenFlowButtonUI()
  updateClassicPresetUI()
  update()
  requestAnimationFrame(animate)

  document.addEventListener("keydown", (event) => {
    if (event.defaultPrevented || isEditableTarget(event.target)) {
      return
    }

    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      event.preventDefault()
      nudgeTemperatureFromKey(event.code, event.repeat)

      return
    }

    if (event.code === "ArrowUp" || event.code === "ArrowDown") {
      event.preventDefault()
      nudgeSpeedMultiplier(event.code === "ArrowUp" ? 1 : -1)

      return
    }

    if (event.key === "+" || event.key === "=") {
      event.preventDefault()
      zoomAtPoint(zoomMultiplier * 1.08)
      return
    }

    if (event.key === "-" || event.key === "_") {
      event.preventDefault()
      zoomAtPoint(zoomMultiplier / 1.08)
      return
    }

    if (event.code === "KeyR") {
      event.preventDefault()
      resetToInitialState()
      return
    }

    if (event.code === "Space") {
      event.preventDefault()
      setUiHidden(!uiHidden)
    }
  })

  window.addEventListener("keydown", (event) => {
    if (event.code !== "Enter" || greenFlowHeld) {
      return
    }

    blurSliderFocus()
    event.preventDefault()
    greenFlowHeld = true
    syncGreenFlowState()
  }, true)

  window.addEventListener("keyup", (event) => {
    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      releaseTemperatureKey(event.code)
    }

    if (event.code !== "Enter" || !greenFlowHeld) {
      return
    }

    event.preventDefault()
    greenFlowHeld = false
    syncGreenFlowState()
  }, true)
</script>

</html>
