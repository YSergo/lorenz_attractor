<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenz attractor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>🦋</text>
    </svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <canvas id="attractor"></canvas>
  <div id="screenshotOverlay" class="screen-overlay hidden" role="status" aria-live="polite" aria-hidden="true">
    <div class="screen-overlay-card">
      <div class="screen-overlay-card-inner">
        <div class="screen-overlay-title">Preparing screenshot</div>
        <div class="screen-overlay-text">This may take a moment.</div>
      </div>
    </div>
  </div>
  <div id="app">
    <div class="menu-toolbar">
      <label id="colorButton" class="menu-button icon-button menu-color-button" aria-label="Choose color" title="Choose color">
        <input id="nativeColorInput" class="native-color-input" type="color" value="#F59642" colorspace="display-p3" aria-label="Choose color">
        <span id="colorPreview" class="native-color-preview"></span>
      </label>
      <button id="screenshotButton" class="menu-button" type="button" aria-label="Take screenshot"
        title="Take screenshot">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4.75" y="4.75" width="14.5" height="14.5" rx="3.4"></rect>
          <circle cx="12" cy="12" r="3.3"></circle>
          <circle class="camera-dot" cx="16.35" cy="7.65" r="0.9"></circle>
        </svg>
      </button>
      <button id="pauseButton" class="menu-button" type="button" aria-pressed="false" title="Pause">pause</button>
      <button id="resetButton" class="menu-button icon-button" type="button" aria-label="Reset scene" title="Reset scene">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 5v4h4"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 19v-4h-4"></path>
        </svg>
      </button>
      <button id="hideMenuButton" class="menu-button icon-button" type="button" aria-label="Hide menu" title="Hide menu">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12"></path>
          <path d="M18 6L6 18"></path>
        </svg>
      </button>
    </div>
    <div class="controls">
      <button id="speedSlider" class="ios-vertical-slider speed-slider" type="button" role="slider" aria-label="Animation speed"
        aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="50" aria-valuenow="1">
        <div id="speedSliderFill" class="ios-vertical-slider-fill"></div>
        <div id="speedSliderLabel" class="ios-vertical-slider-icon">speed</div>
      </button>
    </div>
    <div class="parameter-panel">
      <div class="parameter-panel-title">System variables</div>
      <div class="parameter-grid">
        <div class="parameter-field">
          <span>sigma (σ)</span>
          <div class="parameter-slider" data-key="sigma" data-slider-min="0" data-slider-max="60" role="slider"
            tabindex="0" aria-label="sigma" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="60"
            aria-valuenow="10">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">10</div>
            <input id="paramSigma" class="parameter-slider-input" type="text" step="0.1" value="10"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="sigma">
          </div>
        </div>
        <div class="parameter-field">
          <span>rho (ρ)</span>
          <div class="parameter-slider" data-key="rho" data-slider-min="0" data-slider-max="130" role="slider"
            tabindex="0" aria-label="rho" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="130"
            aria-valuenow="28">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">28</div>
            <input id="paramRho" class="parameter-slider-input" type="text" step="0.1" value="28"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="rho">
          </div>
        </div>
        <div class="parameter-field">
          <span>beta (β)</span>
          <div class="parameter-slider" data-key="beta" data-slider-min="0" data-slider-max="9" role="slider"
            tabindex="0" aria-label="beta" aria-orientation="horizontal" aria-valuemin="0" aria-valuemax="9"
            aria-valuenow="2.67">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">2.67</div>
            <input id="paramBeta" class="parameter-slider-input" type="text" step="0.01" value="2.67"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="beta">
          </div>
        </div>
        <div class="parameter-field">
          <span>x start</span>
          <div class="parameter-slider" data-key="x" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="x start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0.08">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0.08</div>
            <input id="paramX" class="parameter-slider-input" type="text" step="0.01" value="0.08"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="x start">
          </div>
        </div>
        <div class="parameter-field">
          <span>y start</span>
          <div class="parameter-slider" data-key="y" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="y start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0</div>
            <input id="paramY" class="parameter-slider-input" type="text" step="0.01" value="0"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="y start">
          </div>
        </div>
        <div class="parameter-field">
          <span>z start</span>
          <div class="parameter-slider" data-key="z" data-slider-min="-30" data-slider-max="30" role="slider"
            tabindex="0" aria-label="z start" aria-orientation="horizontal" aria-valuemin="-30" aria-valuemax="30"
            aria-valuenow="0">
            <div class="parameter-slider-fill"></div>
            <div class="parameter-slider-value" aria-hidden="true">0</div>
            <input id="paramZ" class="parameter-slider-input" type="text" step="0.01" value="0"
              inputmode="decimal" enterkeyhint="done" spellcheck="false" tabindex="-1" aria-label="z start">
          </div>
        </div>
      </div>
      <div class="parameter-actions">
        <div class="parameter-action-group">
          <div class="parameter-action-label">Integrator</div>
          <div class="integrator-switch" role="group" aria-label="Integrator method">
            <button id="rk4Button" class="preset-button integrator-button is-active" type="button" aria-pressed="true">RK4</button>
            <button id="eulerButton" class="preset-button integrator-button" type="button" aria-pressed="false">Euler</button>
          </div>
        </div>
        <div class="parameter-action-group">
          <div class="parameter-action-label">Quality</div>
          <div class="integrator-switch" role="group" aria-label="Trail quality">
            <button id="trailModeLowButton" class="preset-button integrator-button" type="button" aria-pressed="false">Optimized</button>
            <button id="trailModeHighButton" class="preset-button integrator-button is-active" type="button" aria-pressed="true">High</button>
          </div>
        </div>
      </div>
    </div>
    <div id="hint">
      <div class="parameter-panel-title">extra controls</div>
      <div class="hint-grid">
        <div class="hint-label">reset scene</div>
        <div class="hint-keys"><span class="hint-key">R</span></div>
        <div class="hint-label">toggle UI</div>
        <div class="hint-keys"><span class="hint-key">Escape</span></div>
        <div class="hint-label">move</div>
        <div class="hint-keys"><span class="hint-key">&larr;/&rarr;</span><span class="hint-key">&uarr;/&darr;</span></div>
        <div class="hint-label">zoom <span id="hintZoomValue" class="hint-value">(1x)</span></div>
        <div class="hint-keys"><span class="hint-key">Wheel</span><span class="hint-key">W / S</span></div>
        <div class="hint-label">pause</div>
        <div class="hint-keys"><span class="hint-key">Space</span></div>
        <div class="hint-label">screenshot</div>
        <div class="hint-keys">
          <span class="hint-key">P</span>
          <span class="hint-hold-note">or</span>
          <span class="hint-key hint-icon-key" aria-hidden="true">
            <svg viewBox="0 0 32 32">
              <g>
                <path
                  d="M23.24,8,18.29,5.54a5.13,5.13,0,0,0-4.58,0L8.76,8A5,5,0,0,0,6,12.48v7A5,5,0,0,0,8.76,24l5,2.47a5.13,5.13,0,0,0,4.58,0L23.24,24A5,5,0,0,0,26,19.52v-7A5,5,0,0,0,23.24,8ZM16,20a4,4,0,1,1,4-4A4,4,0,0,1,16,20Z" />
              </g>
            </svg>
          </span>
          <span class="hint-hold-note">(hold)</span>
        </div>
      </div>
    </div>
  </div>
  <button id="menuToggleButton" class="menu-button icon-button hidden" type="button" aria-label="Show menu" title="Show menu">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
      <g>
        <path
          d="M23.24,8,18.29,5.54a5.13,5.13,0,0,0-4.58,0L8.76,8A5,5,0,0,0,6,12.48v7A5,5,0,0,0,8.76,24l5,2.47a5.13,5.13,0,0,0,4.58,0L23.24,24A5,5,0,0,0,26,19.52v-7A5,5,0,0,0,23.24,8ZM16,20a4,4,0,1,1,4-4A4,4,0,0,1,16,20Z" />
      </g>
    </svg>
  </button>
</body>
<script>
  function get2dContext(targetCanvas, options = {}) {
    try {
      const preferredContext = targetCanvas.getContext("2d", {
        colorSpace: "display-p3",
        ...options,
      })

      if (preferredContext) {
        return preferredContext
      }
    } catch (error) {
      console.warn("Falling back to default 2D canvas context.", error)
    }

    return targetCanvas.getContext("2d", options) || targetCanvas.getContext("2d")
  }

  const app = document.getElementById("app")
  const speedSlider = document.getElementById("speedSlider")
  const speedSliderFill = document.getElementById("speedSliderFill")
  const speedSliderLabel = document.getElementById("speedSliderLabel")
  const resetButton = document.getElementById("resetButton")
  const screenshotButton = document.getElementById("screenshotButton")
  const pauseButton = document.getElementById("pauseButton")
  const trailModeLowButton = document.getElementById("trailModeLowButton")
  const trailModeHighButton = document.getElementById("trailModeHighButton")
  const nativeColorInput = document.getElementById("nativeColorInput")
  const colorPreview = document.getElementById("colorPreview")
  const screenshotOverlay = document.getElementById("screenshotOverlay")
  const hideMenuButton = document.getElementById("hideMenuButton")
  const menuToggleButton = document.getElementById("menuToggleButton")
  const rk4Button = document.getElementById("rk4Button")
  const eulerButton = document.getElementById("eulerButton")
  const hintZoomValue = document.getElementById("hintZoomValue")
  const canvas = document.getElementById("attractor")
  const ctx = get2dContext(canvas, { alpha: false, desynchronized: true })
  const parameterInputs = {
    x: document.getElementById("paramX"),
    y: document.getElementById("paramY"),
    z: document.getElementById("paramZ"),
    sigma: document.getElementById("paramSigma"),
    rho: document.getElementById("paramRho"),
    beta: document.getElementById("paramBeta"),
  }
  const parameterSliders = Object.fromEntries(
    Object.keys(parameterInputs).map((key) => {
      const sliderControl = document.querySelector(`.parameter-slider[data-key="${key}"]`)

      return [key, {
        slider: sliderControl,
        fill: sliderControl?.querySelector(".parameter-slider-fill") ?? null,
        value: sliderControl?.querySelector(".parameter-slider-value") ?? null,
      }]
    })
  )
  const minSpeedMultiplier = 0
  const minActiveSpeedMultiplier = 0.003
  const maxSpeedMultiplier = 50
  const speedSliderEdgeThreshold = 0.002
  const speedSliderStopZone = 0.012
  const speedSliderCurveExponent = 1
  const defaultSpeedMultiplier = 1
  const baseSimulationSpeed = 1644
  const speedIntroDuration = 2000
  const menuIntroMinOpacity = 0
  const defaultAttractorScale = 15
  const defaultColorValue = "#F59642"
  const defaultStroke = defaultColorValue
  const defaultGlow = defaultColorValue
  const parameterWheelStepBoost = 10
  const parameterSliderDragThreshold = 4
  const wheelLineHeight = 16
  const wheelPageHeight = 120
  const minZoomMultiplier = 0.01
  const maxZoomMultiplier = 1000000
  const zoomStepFactor = 1.04
  const zoomTrailResetDebounceMs = 200
  const screenshotExportScale = 4
  const screenshotHistoryPointBudget = 600000
  const trailFadeAlpha = 0.04
  const minVisibleTrailAlpha = 1 / 255
  const trailLineWidth = 1.1
  const tailFrameSubdivisionCount = 8
  const keyboardPanStep = 5
  const keyboardZoomFactor = 1.009
  const menuToggleScreenshotHoldDelay = 420
  const minVisibleAttractorIterations = 200
  const viewportPositionResetThreshold = 0.25
  const viewportTransformResetThreshold = 0.0005
  const defaultIntegrator = "rk4"
  const defaultTrailRenderMode = "tail"

  let width = 0
  let height = 0
  let pixelRatio = 1
  let uiHidden = getDefaultUiHidden()
  let isPaused = false
  let speedMultiplier = minActiveSpeedMultiplier
  let zoomMultiplier = getDefaultZoomMultiplier()
  let selectedColorValue = defaultColorValue
  let isDraggingAttractor = false
  let hasCustomAnchor = false
  let dragOffsetX = 0
  let dragOffsetY = 0
  let lastPointerX = 0
  let lastPointerY = 0
  let speedIntroActive = true
  let speedIntroStartedAt = null
  let menuIntroActive = true
  let activeSpeedPointerId = null
  let pinchLastDistance = 0
  let pinchLastCenterX = 0
  let pinchLastCenterY = 0
  let pinchLastAngle = 0
  let isTakingScreenshot = false
  let pendingZoomTrailReset = false
  let zoomTrailResetTimeoutId = null
  let lastRenderedCenterX = Number.NaN
  let lastRenderedCenterY = Number.NaN
  let lastRenderedRotation = Number.NaN
  let renderHistoryFrameId = 0
  let renderHistoryAgeSpan = 0
  let renderHistoryPointCount = 0
  let currentIntegrator = defaultIntegrator
  let currentTrailRenderMode = defaultTrailRenderMode
  let menuToggleHoldTimeoutId = null
  let activeMenuTogglePointerId = null
  let suppressNextMenuToggleClick = false
  const activeMovementKeys = new Set()

  const activeSceneTouches = new Map()
  const renderHistory = []

  const state = {
    x: 0.08,
    y: 0,
    z: 0,
    stroke: defaultStroke,
    glow: defaultGlow,
    strokeAlpha: 0.28,
    scale: defaultAttractorScale,
    speed: baseSimulationSpeed,
    sigma: 10,
    rho: 28,
    beta: 8 / 3,
    rotation: 0,
    anchorX: 0,
    anchorY: 0,
    targetAnchorX: 0,
    targetAnchorY: 0,
  }

  function formatParameterValue(value, fractionDigits = 2) {
    return Number(value.toFixed(fractionDigits)).toString()
  }

  function updateColorButtonUI() {
    nativeColorInput.value = selectedColorValue
    colorPreview.style.setProperty("--swatch-color", selectedColorValue)
  }

  function getDefaultZoomMultiplier() {
    return window.matchMedia("(max-width: 1024px)").matches ? 0.7 : 1
  }

  function getDefaultUiHidden() {
    return window.matchMedia("(max-width: 1024px)").matches
  }

  const defaultInitialConditions = {
    x: Number(parameterInputs.x.value),
    y: Number(parameterInputs.y.value),
    z: Number(parameterInputs.z.value),
  }
  const initialConditions = { ...defaultInitialConditions }

  const defaultParameters = {
    sigma: 10,
    rho: 28,
    beta: 8 / 3,
  }
  const parameters = { ...defaultParameters }

  parameterInputs.sigma.value = formatParameterValue(parameters.sigma)
  parameterInputs.rho.value = formatParameterValue(parameters.rho)
  parameterInputs.beta.value = formatParameterValue(parameters.beta)

  state.x = initialConditions.x
  state.y = initialConditions.y
  state.z = initialConditions.z
  state.sigma = parameters.sigma
  state.rho = parameters.rho
  state.beta = parameters.beta

  function hasPosition(x, y) {
    return x !== 0 || y !== 0
  }

  function getDefaultAnchorTarget() {
    return {
      x: width * 0.5,
      y: height * 0.18,
    }
  }

  function fillCanvasBackground(targetCtx, targetWidth, targetHeight, alpha = 1) {
    targetCtx.fillStyle = `rgba(0, 0, 0, ${alpha})`
    targetCtx.fillRect(0, 0, targetWidth, targetHeight)
  }

  function clearRenderHistory() {
    renderHistory.length = 0
    renderHistoryFrameId = 0
    renderHistoryAgeSpan = 0
    renderHistoryPointCount = 0
  }

  function trimRenderHistory() {
    const visibleTrailAgeBudget = getVisibleTrailAgeBudget()

    while (
      renderHistory.length > 1 && (
        renderHistoryAgeSpan > visibleTrailAgeBudget ||
        renderHistoryPointCount > screenshotHistoryPointBudget
      )
    ) {
      const discardedFrame = renderHistory.shift()

      if (!discardedFrame) {
        break
      }

      renderHistoryAgeSpan -= discardedFrame.ageSpan
      renderHistoryPointCount -= discardedFrame.points.length / 3
    }
  }

  function recordRenderFrame(points, strokeStyle, alpha) {
    const pointCount = Math.floor(points.length / 3)
    const segmentCount = Math.max(0, pointCount - 1)

    if (segmentCount <= 0) {
      return
    }

    const chunkCount = Math.min(tailFrameSubdivisionCount, segmentCount)
    const ageSpan = 1 / chunkCount
    const frameId = renderHistoryFrameId

    for (let chunkIndex = 0; chunkIndex < chunkCount; chunkIndex += 1) {
      const startSegment = Math.floor(segmentCount * chunkIndex / chunkCount)
      const endSegment = Math.floor(segmentCount * (chunkIndex + 1) / chunkCount)

      if (endSegment <= startSegment) {
        continue
      }

      const chunkPoints = points.slice(startSegment * 3, (endSegment + 1) * 3)
      renderHistory.push({ points: chunkPoints, strokeStyle, alpha, ageSpan, frameId })
      renderHistoryAgeSpan += ageSpan
      renderHistoryPointCount += chunkPoints.length / 3
    }

    renderHistoryFrameId += 1
    trimRenderHistory()
  }

  function drawRenderFrame(targetCtx, points, strokeStyle, alpha = 1) {
    if (points.length < 2) {
      return
    }

    targetCtx.save()
    targetCtx.globalAlpha = alpha
    targetCtx.lineWidth = trailLineWidth
    targetCtx.strokeStyle = strokeStyle
    targetCtx.shadowBlur = 0
    targetCtx.shadowColor = strokeStyle
    targetCtx.beginPath()
    targetCtx.moveTo(points[0], points[1])

    for (let i = 2; i < points.length; i += 2) {
      targetCtx.lineTo(points[i], points[i + 1])
    }

    targetCtx.stroke()
    targetCtx.shadowBlur = 0
    targetCtx.restore()
  }

  function getVisibleTrailAgeBudget() {
    const clampedTrailFadeAlpha = Math.min(Math.max(trailFadeAlpha, 0), 1)

    if (renderHistory.length <= 0) {
      return 0
    }

    if (clampedTrailFadeAlpha <= 0) {
      return Number.POSITIVE_INFINITY
    }

    if (clampedTrailFadeAlpha >= 1) {
      return 1
    }

    return Math.max(1, Math.ceil(Math.log(minVisibleTrailAlpha) / Math.log(1 - clampedTrailFadeAlpha)))
  }

  function getProjectionState(centerX, centerY, cosRotation, sinRotation) {
    return {
      centerX,
      centerY,
      cosRotation,
      sinRotation,
      scale: state.scale,
    }
  }

  function getCurrentProjectionState() {
    const defaultAnchor = getDefaultAnchorTarget()
    const centerX = hasPosition(state.anchorX, state.anchorY) ? state.anchorX : defaultAnchor.x
    const centerY = hasPosition(state.anchorX, state.anchorY) ? state.anchorY : defaultAnchor.y

    return getProjectionState(centerX, centerY, Math.cos(state.rotation), Math.sin(state.rotation))
  }

  function projectTrailPoint(points, pointIndex, projectionState) {
    const x = points[pointIndex]
    const y = points[pointIndex + 1]
    const z = points[pointIndex + 2]
    const projectedX = x * projectionState.scale
    const projectedY = z * projectionState.scale - y * projectionState.scale * 0.28

    return {
      x: projectionState.centerX + projectedX * projectionState.cosRotation - projectedY * projectionState.sinRotation,
      y: projectionState.centerY + projectedX * projectionState.sinRotation + projectedY * projectionState.cosRotation,
    }
  }

  function drawProjectedRenderFrame(targetCtx, points, strokeStyle, projectionState, alpha = 1) {
    if (points.length < 3) {
      return
    }

    targetCtx.save()
    targetCtx.globalAlpha = alpha
    targetCtx.lineWidth = trailLineWidth
    targetCtx.strokeStyle = strokeStyle
    targetCtx.shadowBlur = 0
    targetCtx.shadowColor = strokeStyle
    targetCtx.beginPath()

    for (let pointIndex = 0; pointIndex < points.length; pointIndex += 3) {
      const projectedPoint = projectTrailPoint(points, pointIndex, projectionState)

      if (pointIndex === 0) {
        targetCtx.moveTo(projectedPoint.x, projectedPoint.y)
      } else {
        targetCtx.lineTo(projectedPoint.x, projectedPoint.y)
      }
    }

    targetCtx.stroke()
    targetCtx.shadowBlur = 0
    targetCtx.restore()
  }

  function renderVisibleTrail(targetCtx, targetWidth, targetHeight, projectionState) {
    fillCanvasBackground(targetCtx, targetWidth, targetHeight)

    const visibleTrailAgeBudget = getVisibleTrailAgeBudget()
    const visibleFrames = []
    let age = 0

    for (let index = renderHistory.length - 1; index >= 0; index -= 1) {
      const frame = renderHistory[index]
      visibleFrames.push({
        frame,
        age,
      })
      age += frame.ageSpan

      if (age >= visibleTrailAgeBudget) {
        break
      }
    }

    visibleFrames.reverse()

    for (const visibleFrame of visibleFrames) {
      const alpha = visibleFrame.frame.alpha * Math.pow(1 - trailFadeAlpha, visibleFrame.age)

      if (alpha <= minVisibleTrailAlpha) {
        continue
      }

      drawProjectedRenderFrame(
        targetCtx,
        visibleFrame.frame.points,
        visibleFrame.frame.strokeStyle,
        projectionState,
        alpha,
      )
    }
  }

  function renderBufferedTrail(targetCtx, targetWidth, targetHeight, projectionState) {
    fillCanvasBackground(targetCtx, targetWidth, targetHeight)

    let previousFrameId = null

    for (const frame of renderHistory) {
      if (previousFrameId !== null && frame.frameId !== previousFrameId) {
        fillCanvasBackground(targetCtx, targetWidth, targetHeight, trailFadeAlpha)
      }

      drawProjectedRenderFrame(targetCtx, frame.points, frame.strokeStyle, projectionState, frame.alpha)
      previousFrameId = frame.frameId
    }
  }

  function updateTrailModeButtonUI() {
    const isTailMode = currentTrailRenderMode === "tail"
    trailModeLowButton.classList.toggle("is-active", !isTailMode)
    trailModeHighButton.classList.toggle("is-active", isTailMode)
    trailModeLowButton.setAttribute("aria-pressed", String(!isTailMode))
    trailModeHighButton.setAttribute("aria-pressed", String(isTailMode))
  }

  function updatePauseButtonUI() {
    pauseButton.classList.toggle("is-active", isPaused)
    pauseButton.setAttribute("aria-pressed", String(isPaused))
  }

  function replayRenderHistory(targetCtx, targetWidth, targetHeight, projectionState = getCurrentProjectionState()) {
    if (currentTrailRenderMode === "buffer") {
      renderBufferedTrail(targetCtx, targetWidth, targetHeight, projectionState)
      return
    }

    renderVisibleTrail(targetCtx, targetWidth, targetHeight, projectionState)
  }

  function rebuildTrailCanvasFromHistory(projectionState = getCurrentProjectionState()) {
    replayRenderHistory(ctx, width, height, projectionState)
  }

  function setTrailRenderMode(mode) {
    if (mode !== "tail" && mode !== "buffer") {
      return
    }

    if (currentTrailRenderMode === mode) {
      return
    }

    currentTrailRenderMode = mode
    updateTrailModeButtonUI()
    rebuildTrailCanvasFromHistory()
  }

  function getLorenzDerivative(sample) {
    return {
      x: sample.sigma * (sample.y - sample.x),
      y: sample.x * (sample.rho - sample.z) - sample.y,
      z: sample.x * sample.y - sample.beta * sample.z,
    }
  }

  function integrateLorenzEuler(simulationState, dt) {
    const derivative = getLorenzDerivative(simulationState)

    simulationState.x += derivative.x * dt
    simulationState.y += derivative.y * dt
    simulationState.z += derivative.z * dt
  }

  function integrateLorenzRk4(simulationState, dt) {
    const halfDt = dt * 0.5
    const k1 = getLorenzDerivative(simulationState)
    const k2 = getLorenzDerivative({
      x: simulationState.x + k1.x * halfDt,
      y: simulationState.y + k1.y * halfDt,
      z: simulationState.z + k1.z * halfDt,
      sigma: simulationState.sigma,
      rho: simulationState.rho,
      beta: simulationState.beta,
    })
    const k3 = getLorenzDerivative({
      x: simulationState.x + k2.x * halfDt,
      y: simulationState.y + k2.y * halfDt,
      z: simulationState.z + k2.z * halfDt,
      sigma: simulationState.sigma,
      rho: simulationState.rho,
      beta: simulationState.beta,
    })
    const k4 = getLorenzDerivative({
      x: simulationState.x + k3.x * dt,
      y: simulationState.y + k3.y * dt,
      z: simulationState.z + k3.z * dt,
      sigma: simulationState.sigma,
      rho: simulationState.rho,
      beta: simulationState.beta,
    })

    simulationState.x += (dt / 6) * (k1.x + 2 * k2.x + 2 * k3.x + k4.x)
    simulationState.y += (dt / 6) * (k1.y + 2 * k2.y + 2 * k3.y + k4.y)
    simulationState.z += (dt / 6) * (k1.z + 2 * k2.z + 2 * k3.z + k4.z)
  }

  function integrateLorenzStep(simulationState, dt) {
    if (currentIntegrator === "euler") {
      integrateLorenzEuler(simulationState, dt)
      return
    }

    integrateLorenzRk4(simulationState, dt)
  }

  function getFallbackExportCanvas() {
    const exportCanvas = document.createElement("canvas")
    const exportCtx = get2dContext(exportCanvas)

    if (!exportCtx) {
      throw new Error("Could not create fallback export canvas context.")
    }

    exportCanvas.width = canvas.width
    exportCanvas.height = canvas.height
    exportCtx.translate(exportCanvas.width, exportCanvas.height)
    exportCtx.rotate(Math.PI)
    exportCtx.drawImage(canvas, 0, 0)

    return exportCanvas
  }

  function clearCanvas() {
    clearRenderHistory()
    ctx.clearRect(0, 0, width, height)
    fillCanvasBackground(ctx, width, height)
  }

  function createScreenshotFilename(prefix = "lorenz-screenshot") {
    const timestamp = new Date().toISOString().replaceAll(":", "-").replaceAll(".", "-")
    return `${prefix}-${timestamp}.png`
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob)
    const link = document.createElement("a")

    link.href = url
    link.download = filename
    document.body.append(link)
    link.click()
    link.remove()

    window.setTimeout(() => {
      URL.revokeObjectURL(url)
    }, 0)
  }

  function downloadCanvasAsPng(sourceCanvas, filename) {
    return new Promise((resolve, reject) => {
      if (typeof sourceCanvas.toBlob === "function") {
        sourceCanvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Could not create screenshot PNG blob."))
            return
          }

          downloadBlob(blob, filename)
          resolve()
        }, "image/png")
        return
      }

      try {
        const link = document.createElement("a")
        link.href = sourceCanvas.toDataURL("image/png")
        link.download = filename
        document.body.append(link)
        link.click()
        link.remove()
        resolve()
      } catch (error) {
        reject(error)
      }
    })
  }

  function waitForNextPaint() {
    return new Promise((resolve) => {
      requestAnimationFrame(() => {
        requestAnimationFrame(resolve)
      })
    })
  }

  function setScreenshotOverlayVisible(isVisible) {
    screenshotOverlay.classList.toggle("hidden", !isVisible)
    screenshotOverlay.setAttribute("aria-hidden", String(!isVisible))
  }

  function getExportCanvas() {
    if (renderHistory.length === 0) {
      return getFallbackExportCanvas()
    }

    const exportCanvas = document.createElement("canvas")
    const exportCtx = get2dContext(exportCanvas)

    if (!exportCtx) {
      throw new Error("Could not create export canvas context.")
    }

    const exportPixelRatio = pixelRatio * screenshotExportScale

    exportCanvas.width = Math.round(width * exportPixelRatio)
    exportCanvas.height = Math.round(height * exportPixelRatio)
    exportCtx.setTransform(
      -exportPixelRatio,
      0,
      0,
      -exportPixelRatio,
      exportCanvas.width,
      exportCanvas.height,
    )
    replayRenderHistory(exportCtx, width, height)

    return exportCanvas
  }

  async function saveSceneAsPng() {
    await downloadCanvasAsPng(getExportCanvas(), createScreenshotFilename("lorenz-canvas"))
  }

  async function handleScreenshotButtonClick() {
    if (isTakingScreenshot) {
      return
    }

    isTakingScreenshot = true
    screenshotButton.disabled = true
    setScreenshotOverlayVisible(true)

    try {
      await waitForNextPaint()
      await saveSceneAsPng()
    } finally {
      isTakingScreenshot = false
      screenshotButton.disabled = false
      setScreenshotOverlayVisible(false)
      screenshotButton.blur()
    }
  }

  function hasViewportChanged(centerX, centerY) {
    if (
      !Number.isFinite(lastRenderedCenterX) ||
      !Number.isFinite(lastRenderedCenterY) ||
      !Number.isFinite(lastRenderedRotation)
    ) {
      return true
    }

    return (
      Math.abs(centerX - lastRenderedCenterX) > viewportPositionResetThreshold ||
      Math.abs(centerY - lastRenderedCenterY) > viewportPositionResetThreshold ||
      Math.abs(state.rotation - lastRenderedRotation) > viewportTransformResetThreshold
    )
  }

  function syncRenderedViewport(centerX, centerY) {
    lastRenderedCenterX = centerX
    lastRenderedCenterY = centerY
    lastRenderedRotation = state.rotation
  }

    pendingZoomTrailReset = false

      zoomTrailResetTimeoutId = null
      pendingZoomTrailReset = true

  function isParameterControlTarget(target) {

    dragOffsetY = 0

    state.targetAnchorY = state.anchorY
  }

  function getActivePinchMetrics() {
    if (activeSceneTouches.size < 2) {
      return null
    }

    const [firstTouch, secondTouch] = Array.from(activeSceneTouches.values())
    const dx = secondTouch.x - firstTouch.x
    const dy = secondTouch.y - firstTouch.y

    return {
      centerX: (firstTouch.x + secondTouch.x) * 0.5,
      centerY: (firstTouch.y + secondTouch.y) * 0.5,
      distance: Math.hypot(dx, dy),
      angle: Math.atan2(dy, dx),

    if (angle > Math.PI) {
      return angle - Math.PI * 2

    if (angle < -Math.PI) {
      return angle + Math.PI * 2

    return angle

  function syncPinchState() {
    const pinchMetrics = getActivePinchMetrics()

    if (!pinchMetrics) {
      pinchLastDistance = 0
      pinchLastCenterX = 0
      pinchLastCenterY = 0
      pinchLastAngle = 0
      return false
    }

    if (pinchLastDistance === 0) {
      pinchLastDistance = pinchMetrics.distance
      pinchLastCenterX = pinchMetrics.centerX
      pinchLastCenterY = pinchMetrics.centerY
      pinchLastAngle = pinchMetrics.angle
      return true
    }

    if (pinchMetrics.distance > 0) {
      const currentCenter = getVisibleAnchorPosition()
      const currentZoomMultiplier = zoomMultiplier
      const rotationDelta = normalizeAngleDelta(pinchMetrics.angle - pinchLastAngle)
      const nextZoomMultiplier = clamp(
        currentZoomMultiplier * (pinchMetrics.distance / pinchLastDistance),
        minZoomMultiplier,
        maxZoomMultiplier
      )
      const scaleRatio = nextZoomMultiplier / currentZoomMultiplier
      const offsetX = currentCenter.x - pinchLastCenterX
      const offsetY = currentCenter.y - pinchLastCenterY
      const cos = Math.cos(rotationDelta)
      const sin = Math.sin(rotationDelta)
      const rotatedOffsetX = (offsetX * cos - offsetY * sin) * scaleRatio
      const rotatedOffsetY = (offsetX * sin + offsetY * cos) * scaleRatio
      const nextCenterX = pinchMetrics.centerX + rotatedOffsetX
      const nextCenterY = pinchMetrics.centerY + rotatedOffsetY

      if (nextZoomMultiplier !== currentZoomMultiplier) {
        scheduleZoomTrailReset()
      }

      zoomMultiplier = nextZoomMultiplier
      state.rotation += rotationDelta
      setAnchorFromVisibleCenter(nextCenterX, nextCenterY)
      update()

    pinchLastDistance = pinchMetrics.distance
    pinchLastCenterX = pinchMetrics.centerX
    pinchLastCenterY = pinchMetrics.centerY
    pinchLastAngle = pinchMetrics.angle

    return true
  }

  function setUiHidden(nextHidden) {
    uiHidden = nextHidden

    menuToggleButton.classList.toggle("hidden", !uiHidden)

    if (!uiHidden) {
      updateAnchor()
    }

    updateMenuIntroOpacity()
  }

  function getMenuIntroOpacity() {
    if (!menuIntroActive) {
      return 1
    }

    const startProgress = speedMultiplierToProgress(minActiveSpeedMultiplier)
    const endProgress = speedMultiplierToProgress(defaultSpeedMultiplier)
    const currentProgress = speedMultiplierToProgress(speedMultiplier)

    if (endProgress <= startProgress) {
      return 1
    }

    const normalizedProgress = clamp(
      (currentProgress - startProgress) / (endProgress - startProgress),
      0,
      1
    )

    return menuIntroMinOpacity + (1 - menuIntroMinOpacity) * normalizedProgress
  }

  function finishMenuIntro() {
    menuIntroActive = false
    app.style.opacity = uiHidden ? "0" : "1"
    menuToggleButton.style.opacity = uiHidden ? "1" : "0"
  }

  function updateMenuIntroOpacity() {
    const introOpacity = getMenuIntroOpacity()
    const opacityText = introOpacity.toFixed(3)

    app.style.opacity = uiHidden ? "0" : opacityText
    menuToggleButton.style.opacity = uiHidden ? opacityText : "0"

    if (introOpacity >= 1) {
      finishMenuIntro()
    }
  }

  function updateIntegratorUI() {
    rk4Button.classList.toggle("is-active", currentIntegrator === "rk4")
    rk4Button.setAttribute("aria-pressed", String(currentIntegrator === "rk4"))
    eulerButton.classList.toggle("is-active", currentIntegrator === "euler")
    eulerButton.setAttribute("aria-pressed", String(currentIntegrator === "euler"))

  function setIntegrator(nextIntegrator, { resetSimulationState = true } = {}) {
    if (nextIntegrator !== "rk4" && nextIntegrator !== "euler") {
      return
    }

    const hasChanged = currentIntegrator !== nextIntegrator
    currentIntegrator = nextIntegrator
    updateIntegratorUI()

    if (hasChanged && resetSimulationState) {
      resetSimulation()
      update()
    }
  }

  function resetSimulation() {
    state.x = initialConditions.x
    state.y = initialConditions.y
    state.z = initialConditions.z
    clearCanvas()
  }

  function resetToInitialState() {
    isPaused = false
    speedMultiplier = minActiveSpeedMultiplier
    speedIntroActive = true
    speedIntroStartedAt = null
    zoomMultiplier = getDefaultZoomMultiplier()
    selectedColorValue = defaultColorValue
    activeSpeedPointerId = null
    activeSceneTouches.clear()
    syncPinchState()
    clearZoomTrailResetDebounce()
    lastPointerX = width * 0.5
    lastPointerY = height * 0.5
    setIntegrator(defaultIntegrator, { resetSimulationState: false })

    initialConditions.x = defaultInitialConditions.x
    initialConditions.y = defaultInitialConditions.y
    initialConditions.z = defaultInitialConditions.z
    parameters.sigma = defaultParameters.sigma
    parameters.rho = defaultParameters.rho
    parameters.beta = defaultParameters.beta

    parameterInputs.x.value = formatParameterValue(defaultInitialConditions.x)
    parameterInputs.y.value = formatParameterValue(defaultInitialConditions.y)
    parameterInputs.z.value = formatParameterValue(defaultInitialConditions.z)
    parameterInputs.sigma.value = formatParameterValue(defaultParameters.sigma)
    parameterInputs.rho.value = formatParameterValue(defaultParameters.rho)
    parameterInputs.beta.value = formatParameterValue(defaultParameters.beta)

    clearDragInteraction()
    hasCustomAnchor = false
    state.rotation = 0
    state.anchorX = 0
    state.anchorY = 0
    state.targetAnchorX = 0
    state.targetAnchorY = 0
    resetSimulation()
    update()
  }

  function resizeCanvas() {
    pixelRatio = window.devicePixelRatio || 1
    width = window.innerWidth
    height = window.innerHeight
    canvas.width = Math.round(width * pixelRatio)
    canvas.height = Math.round(height * pixelRatio)
    ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0)
    clearZoomTrailResetDebounce()
    lastRenderedCenterX = Number.NaN
    lastRenderedCenterY = Number.NaN
    lastRenderedRotation = Number.NaN
    clearCanvas()
    lastPointerX = width * 0.5
    lastPointerY = height * 0.5
    updateAnchor()
  }

  function updateAnchor() {

    state.targetAnchorX = defaultAnchor.x
    state.targetAnchorY = defaultAnchor.y
  }

  function updateAnchorFromPointer(clientX, clientY) {
    const nextAnchorX = width - (clientX - dragOffsetX)
    const nextAnchorY = height - (clientY - dragOffsetY)

    state.anchorX = nextAnchorX
    state.targetAnchorX = nextAnchorX
    state.anchorY = nextAnchorY
    state.targetAnchorY = nextAnchorY

  function getCurrentAnchorPosition() {

    const hasAnchor = hasPosition(state.anchorX, state.anchorY)
    const hasTargetAnchor = hasPosition(state.targetAnchorX, state.targetAnchorY)

    if (hasAnchor) {
      return {
        x: state.anchorX,
        y: state.anchorY,

    if (hasTargetAnchor) {
      return {
        x: state.targetAnchorX,
        y: state.targetAnchorY,

    return {
      x: defaultAnchor.x,
      y: defaultAnchor.y,

  function getVisibleAnchorPosition() {

  function syncAttractor() {

    state.sigma = parameters.sigma
    state.rho = parameters.rho
    state.beta = parameters.beta

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value))

  function getWheelDeltaPixels(event) {

    if (event.deltaMode === WheelEvent.DOM_DELTA_PAGE) {
      return event.deltaY * wheelPageHeight
    }

    return event.deltaY
  }

  function getParameterInputStep(input) {
    const step = Number(input.step)
    return Number.isFinite(step) && step > 0 ? step : 1

  function normalizeParameterInputValue(value) {
    return value.replaceAll(",", ".").trim()

  function parseParameterInputValue(input) {
    const normalizedValue = normalizeParameterInputValue(input.value)

    if (normalizedValue === "") {

    return Number(normalizedValue)

  function formatParameterInputValue(input, value) {
    return Number(value.toFixed(getParameterInputFractionDigits(input))).toString()
  }

  function getParameterInputFractionDigits(input) {
    const stepText = input.getAttribute("step") || ""
    const decimalPart = stepText.split(".")[1]
    return decimalPart ? decimalPart.length : 0
  }

  function getParameterInputBounds(input) {
    const min = input.min === "" ? -Infinity : Number(input.min)
    const max = input.max === "" ? Infinity : Number(input.max)

      min: Number.isFinite(min) ? min : -Infinity,
      max: Number.isFinite(max) ? max : Infinity,

  }

  function getStoredParameterValue(key) {
    if (key === "x" || key === "y" || key === "z") {

  function getParameterSliderBounds(key) {

    const max = Number(sliderControl?.dataset.sliderMax)

      min: Number.isFinite(min) ? min : 0,
      max: Number.isFinite(max) ? max : 1,

  function getParameterRangeState(key, value) {
    const { min, max } = getParameterSliderBounds(key)

    if (value < min) {

    if (value > max) {

    return "in-range"

  function syncParameterInputSize(input) {
    if (!input) {

  function updateParameterSliderUI(key) {
    const sliderControl = parameterSliders[key]?.slider
    const sliderFill = parameterSliders[key]?.fill
    const sliderValue = parameterSliders[key]?.value

    if (!sliderControl || !sliderFill || !sliderValue) {
      return
    }

    const input = parameterInputs[key]
    const inputValue = parseParameterInputValue(input)
    const currentValue = Number.isFinite(inputValue) ? inputValue : getStoredParameterValue(key)
    const { min, max } = getParameterSliderBounds(key)
    const rangeState = getParameterRangeState(key, currentValue)
    const progress = max > min ? clamp((currentValue - min) / (max - min), 0, 1) : 0
    const baseDisplayValue = input.value === "" ? formatParameterInputValue(input, currentValue) : input.value
    const displayValue = rangeState === "high"
      ? `${baseDisplayValue} ↑`
      : rangeState === "low"

    sliderValue.textContent = displayValue

    sliderControl.setAttribute("aria-valuemax", max.toString())
    sliderControl.setAttribute("aria-valuenow", currentValue.toString())
    sliderControl.setAttribute("aria-valuetext", displayValue)

  function updateParameterSlidersUI() {
    Object.keys(parameterInputs).forEach((key) => {
      updateParameterSliderUI(key)

  function nudgeParameterInput(key, input, direction, stepMultiplier = 1) {
    const currentValue = parseParameterInputValue(input)
    const baseValue = Number.isFinite(currentValue) ? currentValue : getStoredParameterValue(key)
    const { min, max } = getParameterInputBounds(input)
    const fractionDigits = getParameterInputFractionDigits(input)

      baseValue + direction * getParameterInputStep(input) * stepMultiplier,
      min,
      max

    updateParameter(key, input)
  }

  function setParameterFromSliderPointer(key, clientX) {

    if (!sliderControl || !input) {

    }

    const rect = sliderControl.getBoundingClientRect()
    const progress = clamp((clientX - rect.left) / rect.width, 0, 1)
    const { min, max } = getParameterSliderBounds(key)
    const nextValue = min + (max - min) * progress

    input.value = formatParameterInputValue(input, nextValue)
    updateParameter(key, input)
  }

  function startParameterInputEdit(key) {
    const sliderControl = parameterSliders[key]?.slider

    const nextValue = parseParameterInputValue(input)

    if (revert || input.value === "" || !Number.isFinite(nextValue)) {

  function speedMultiplierToProgress(multiplier) {
    const clampedMultiplier = clamp(multiplier, minSpeedMultiplier, maxSpeedMultiplier)

    if (clampedMultiplier <= minSpeedMultiplier) {
      return 0
    }

    const minLog = Math.log(minActiveSpeedMultiplier)
    const maxLog = Math.log(maxSpeedMultiplier)
    const currentLog = Math.log(clamp(clampedMultiplier, minActiveSpeedMultiplier, maxSpeedMultiplier))
    const normalizedValue = (currentLog - minLog) / (maxLog - minLog)

    const safeProgress = clamp(progress, 0, 1)

    }

    const normalizedProgress = (safeProgress - speedSliderStopZone) / (1 - speedSliderStopZone)
    const minLog = Math.log(minActiveSpeedMultiplier)
    const maxLog = Math.log(maxSpeedMultiplier)

    return Math.exp(minLog + (maxLog - minLog) * Math.pow(normalizedProgress, speedSliderCurveExponent))
  }

  function formatSpeedMultiplier() {
    if (speedMultiplier <= minSpeedMultiplier) {
      return "0"
    }

    if (speedMultiplier <= minActiveSpeedMultiplier) {
      return "min"
    }

    const progress = speedMultiplierToProgress(speedMultiplier)

    if (progress >= 1 - speedSliderEdgeThreshold) {
      return "max"
    }

    return Math.max(0.01, speedMultiplier).toFixed(2)
  }

  function formatZoomMultiplier() {
    return zoomMultiplier >= 1
      ? Number(zoomMultiplier.toFixed(1)).toString()
      : Number(zoomMultiplier.toFixed(2)).toString()
  }

  function updateSpeedSliderUI() {
    const progress = speedMultiplierToProgress(speedMultiplier)
    const fillWidth = Math.max(0, progress * 100)
    const formattedSpeed = formatSpeedMultiplier()
    const speedValueText = formattedSpeed === "min" || formattedSpeed === "max"
      ? formattedSpeed
      : formattedSpeed + "x"

    speedSliderLabel.textContent = "speed"
    speedSlider.setAttribute("aria-valuenow", Number(speedMultiplier.toFixed(3)).toString())
    speedSlider.setAttribute("aria-valuetext", speedValueText)
  }

  function setSpeedMultiplier(nextValue, { cancelIntro = true } = {}) {
    const clampedValue = clamp(nextValue, minSpeedMultiplier, maxSpeedMultiplier)

    if (cancelIntro) {

      speedIntroStartedAt = null

      if (menuIntroActive) {
        finishMenuIntro()
      }
    }

    speedMultiplier = clampedValue > minSpeedMultiplier && clampedValue < minActiveSpeedMultiplier
      ? minActiveSpeedMultiplier
      : clampedValue

    update()
  }

  function setPaused(nextPaused) {
    if (isPaused === nextPaused) {
      return
    }

    isPaused = nextPaused
    speedIntroActive = false
    speedIntroStartedAt = null

    if (menuIntroActive) {
      finishMenuIntro()
    }

    update()
  }

  function advanceSpeedIntro(timestamp) {
    if (!speedIntroActive) {
      return
    }

    if (!Number.isFinite(timestamp)) {
      return
    }

    if (speedIntroStartedAt === null) {
      speedIntroStartedAt = timestamp
    }

    const progress = clamp((timestamp - speedIntroStartedAt) / speedIntroDuration, 0, 1)
    const easedProgress = Math.pow(progress, 5)
    const nextSpeed = minActiveSpeedMultiplier
      + (defaultSpeedMultiplier - minActiveSpeedMultiplier) * easedProgress

    setSpeedMultiplier(nextSpeed, { cancelIntro: false })

    if (progress >= 1) {
      speedIntroActive = false
      speedIntroStartedAt = null
      setSpeedMultiplier(defaultSpeedMultiplier, { cancelIntro: false })
    }
  }

  function isPointerInsideElement(element, clientX, clientY) {
    const rect = element.getBoundingClientRect()

    return (
      clientX >= rect.left &&
      clientX <= rect.right &&
      clientY >= rect.top &&
      clientY <= rect.bottom
    )
  }

  function clearMenuToggleHold() {
    if (menuToggleHoldTimeoutId !== null) {
      clearTimeout(menuToggleHoldTimeoutId)
      menuToggleHoldTimeoutId = null
    }

    activeMenuTogglePointerId = null
  }

  function startMenuToggleHold(pointerId) {
    clearMenuToggleHold()
    activeMenuTogglePointerId = pointerId
    menuToggleHoldTimeoutId = window.setTimeout(() => {
      menuToggleHoldTimeoutId = null

      if (activeMenuTogglePointerId !== pointerId) {
        return
      }

      suppressNextMenuToggleClick = true
      clearMenuToggleHold()
      void handleScreenshotButtonClick()
    }, menuToggleScreenshotHoldDelay)
  }

  function blurSliderFocus() {
    if (document.activeElement === speedSlider) {
      document.activeElement.blur()
    }
  }

  function setZoomMultiplier(nextValue) {
    zoomMultiplier = clamp(nextValue, minZoomMultiplier, maxZoomMultiplier)
    update()
  }

  function zoomAtPoint(nextValue, clientX = lastPointerX || width * 0.5, clientY = lastPointerY || height * 0.5) {
    const nextZoom = clamp(nextValue, minZoomMultiplier, maxZoomMultiplier)

    if (nextZoom === zoomMultiplier) {
      return
    }

    const currentAnchor = getCurrentAnchorPosition()
    const currentCenterX = width - currentAnchor.x
    const currentCenterY = height - currentAnchor.y
    const currentScale = defaultAttractorScale * zoomMultiplier
    const nextScale = defaultAttractorScale * nextZoom
    const scaleRatio = nextScale / currentScale
    const nextCenterX = clientX - (clientX - currentCenterX) * scaleRatio
    const nextCenterY = clientY - (clientY - currentCenterY) * scaleRatio

    hasCustomAnchor = true
    state.anchorX = width - nextCenterX
    state.targetAnchorX = state.anchorX
    state.anchorY = height - nextCenterY
    state.targetAnchorY = state.anchorY
    zoomMultiplier = nextZoom
    scheduleZoomTrailReset()
    update()
  }

  function panVisibleCenter(offsetX, offsetY) {
    const currentCenter = getVisibleAnchorPosition()

    setAnchorFromVisibleCenter(currentCenter.x + offsetX, currentCenter.y + offsetY)
    update()
  }

  function applyHeldKeyboardMovement() {
    const isMovingForward = activeMovementKeys.has("KeyW")
    const isMovingBackward = activeMovementKeys.has("KeyS")
    const isMovingLeft = activeMovementKeys.has("ArrowLeft")
    const isMovingRight = activeMovementKeys.has("ArrowRight")
    const isMovingUp = activeMovementKeys.has("ArrowUp")
    const isMovingDown = activeMovementKeys.has("ArrowDown")

    if (!isMovingForward && !isMovingBackward && !isMovingLeft && !isMovingRight && !isMovingUp && !isMovingDown) {
      return
    }

    if (isMovingForward !== isMovingBackward) {
      zoomAtPoint(
        isMovingForward
          ? zoomMultiplier * keyboardZoomFactor
          : zoomMultiplier / keyboardZoomFactor,
      )
    }

    if (isMovingLeft !== isMovingRight) {
      panVisibleCenter(
        isMovingLeft ? keyboardPanStep : -keyboardPanStep,
        0,
      )
    }

    if (isMovingUp !== isMovingDown) {
      panVisibleCenter(
        0,
        isMovingUp ? keyboardPanStep : -keyboardPanStep,
      )
    }
  }

  function updateParameter(key, input) {
    if (input.value === "") {
      return
    }

    const nextValue = parseParameterInputValue(input)

    if (!Number.isFinite(nextValue)) {
      return
    }

    if (key === "x" || key === "y" || key === "z") {
      initialConditions[key] = nextValue
    } else {
      parameters[key] = nextValue
      state[key] = nextValue
    }

    resetSimulation()
    update()
  }

  function applySpeedFromPointer(clientX) {
    const rect = speedSlider.getBoundingClientRect()
    const progress = (clientX - rect.left) / rect.width
    setSpeedMultiplier(progressToSpeedMultiplier(progress))
  }

  function update() {
    updateColorButtonUI()
    hintZoomValue.textContent = `(${formatZoomMultiplier()}x)`
    syncAttractor()
    updateSpeedSliderUI()
    updateParameterSlidersUI()
    updateTrailModeButtonUI()
    updatePauseButtonUI()
    updateAnchor()
    updateMenuIntroOpacity()
  }

  function stepAttractor(iterations) {
    const baseDt = 0.005
    const simulationIterations = Math.max(0, Math.round(iterations))
    const defaultAnchor = getDefaultAnchorTarget()
    const targetAnchor = hasPosition(state.targetAnchorX, state.targetAnchorY)
      ? { x: state.targetAnchorX, y: state.targetAnchorY }
      : defaultAnchor

    if (!hasPosition(state.anchorX, state.anchorY)) {
      state.anchorX = targetAnchor.x
      state.anchorY = targetAnchor.y
    }

    state.anchorX += (targetAnchor.x - state.anchorX) * 0.08
    state.anchorY += (targetAnchor.y - state.anchorY) * 0.08

    const centerX = state.anchorX
    const centerY = state.anchorY
    const cosRotation = Math.cos(state.rotation)
    const sinRotation = Math.sin(state.rotation)
    const projectionState = getProjectionState(centerX, centerY, cosRotation, sinRotation)
    const isZoomTrailResetScheduled = zoomTrailResetTimeoutId !== null
    const shouldResetTrailForZoom = isZoomTrailResetScheduled || pendingZoomTrailReset
    const shouldResetTrailForPinch = activeSceneTouches.size >= 2 && !shouldResetTrailForZoom
    const shouldResetTrailForViewportChange = !shouldResetTrailForZoom
      && hasViewportChanged(centerX, centerY)
    const shouldResetTrail = (
      isDraggingAttractor ||
      shouldResetTrailForPinch ||
      shouldResetTrailForZoom ||
      shouldResetTrailForViewportChange
    )

    if (simulationIterations <= 0) {
      if (shouldResetTrailForZoom) {
        pendingZoomTrailReset = false
      }

      if (shouldResetTrail) {
        replayRenderHistory(ctx, width, height, projectionState)
        syncRenderedViewport(centerX, centerY)
      }

      return
    }

    const drawIterations = Math.max(simulationIterations, minVisibleAttractorIterations)
    const dt = baseDt * (simulationIterations / drawIterations)

    if (shouldResetTrail) {
      if (shouldResetTrailForZoom) {
        pendingZoomTrailReset = false
      }

      if (currentTrailRenderMode === "buffer") {
        clearCanvas()
      }
    } else if (currentTrailRenderMode === "buffer") {
      fillCanvasBackground(ctx, width, height, trailFadeAlpha)
    }

    const framePoints = new Float32Array(drawIterations * 3)
    let screenFramePoints = null

    if (currentTrailRenderMode === "buffer") {
      screenFramePoints = new Float32Array(drawIterations * 2)
    }

    for (let i = 0; i < drawIterations; i += 1) {
      integrateLorenzStep(state, dt)

      const pointIndex = i * 3
      framePoints[pointIndex] = state.x
      framePoints[pointIndex + 1] = state.y
      framePoints[pointIndex + 2] = state.z

      if (screenFramePoints) {
        const projectedPoint = projectTrailPoint(framePoints, pointIndex, projectionState)
        const screenPointIndex = i * 2
        screenFramePoints[screenPointIndex] = projectedPoint.x
        screenFramePoints[screenPointIndex + 1] = projectedPoint.y
      }
    }

    recordRenderFrame(framePoints, state.stroke, state.strokeAlpha)

    if (currentTrailRenderMode === "tail") {
      renderVisibleTrail(ctx, width, height, projectionState)
    } else if (screenFramePoints) {
      drawRenderFrame(ctx, screenFramePoints, state.stroke, state.strokeAlpha)
    }

    syncRenderedViewport(centerX, centerY)
  }

  function animate(timestamp) {
    advanceSpeedIntro(timestamp)
    if (!isTakingScreenshot) {
      applyHeldKeyboardMovement()
      stepAttractor(state.speed)
    }
    requestAnimationFrame(animate)
  }

  Object.entries(parameterInputs).forEach(([key, input]) => {
    const sliderControl = parameterSliders[key]?.slider
    const sliderValue = parameterSliders[key]?.value
    let activePointerId = null
    let pointerStartX = 0
    let pointerDidDrag = false

    input.addEventListener("input", () => {
      syncParameterInputSize(input)
      updateParameter(key, input)
    })

    input.addEventListener("pointerdown", (event) => {
      event.stopPropagation()
    })

    input.addEventListener("keydown", (event) => {
      if (event.code === "Enter") {
        event.preventDefault()
        input.blur()
        return
      }

      if (event.code === "Escape") {
        event.preventDefault()
        stopParameterInputEdit(key, { revert: true })
        sliderControl?.focus()
      }
    })

    input.addEventListener("blur", () => {
      stopParameterInputEdit(key)
    })

    sliderValue?.addEventListener("pointerdown", (event) => {
      event.stopPropagation()
    })

    sliderValue?.addEventListener("click", (event) => {
      if (sliderControl?.classList.contains("is-editing")) {
        return
      }

      event.preventDefault()
      event.stopPropagation()
      startParameterInputEdit(key)
    })

    sliderControl?.addEventListener("wheel", (event) => {
      if (sliderControl.classList.contains("is-editing") && event.target instanceof Element && event.target.closest("input")) {
        return
      }

      if (sliderControl.classList.contains("is-editing")) {
        stopParameterInputEdit(key)
      }

      const deltaPixels = getWheelDeltaPixels(event)

      if (deltaPixels === 0) {
        return
      }

      event.preventDefault()
      event.stopPropagation()

      const direction = deltaPixels < 0 ? 1 : -1
      const wheelSteps = Math.max(1, Math.round(Math.abs(deltaPixels) / 40))
      const stepMultiplier = wheelSteps * (event.shiftKey ? parameterWheelStepBoost : 1)

      nudgeParameterInput(key, input, direction, stepMultiplier)
    }, { passive: false })

    sliderControl?.addEventListener("pointerdown", (event) => {
      if (event.target instanceof Element && event.target.closest("input")) {
        return
      }

      if (event.pointerType === "mouse" && event.button !== 0) {
        return
      }

      if (sliderControl.classList.contains("is-editing")) {
        stopParameterInputEdit(key)
      }

      activePointerId = event.pointerId
      pointerStartX = event.clientX
      pointerDidDrag = false
      sliderControl.setPointerCapture(event.pointerId)
      sliderControl.focus()
      event.preventDefault()
      pointerDidDrag = true
      setParameterFromSliderPointer(key, event.clientX)
    })

    sliderControl?.addEventListener("pointermove", (event) => {
      if (activePointerId !== event.pointerId) {
        return
      }

      if (event.buttons === 0 && event.pointerType !== "touch") {
        return
      }

      if (!pointerDidDrag && Math.abs(event.clientX - pointerStartX) < parameterSliderDragThreshold) {
        return
      }

      pointerDidDrag = true
      setParameterFromSliderPointer(key, event.clientX)
    })

    sliderControl?.addEventListener("pointerup", (event) => {
      if (activePointerId === event.pointerId) {
        activePointerId = null
        pointerStartX = 0
        pointerDidDrag = false
      }
    })

    sliderControl?.addEventListener("pointercancel", (event) => {
      if (activePointerId === event.pointerId) {
        activePointerId = null
        pointerStartX = 0
        pointerDidDrag = false
      }
    })

    sliderControl?.addEventListener("lostpointercapture", () => {
      activePointerId = null
      pointerStartX = 0
      pointerDidDrag = false
    })

  })
  nativeColorInput.addEventListener("input", () => {
    selectedColorValue = nativeColorInput.value
    update()
  })
  resetButton.addEventListener("click", () => {
    resetToInitialState()
    resetButton.blur()
  })
  trailModeLowButton.addEventListener("click", () => {
    setTrailRenderMode("buffer")
    trailModeLowButton.blur()
  })
  trailModeHighButton.addEventListener("click", () => {
    setTrailRenderMode("tail")
    trailModeHighButton.blur()
  })
  rk4Button.addEventListener("click", () => {
    setIntegrator("rk4")
    rk4Button.blur()
  })
  eulerButton.addEventListener("click", () => {
    setIntegrator("euler")
    eulerButton.blur()
  })
  screenshotButton.addEventListener("click", () => {
    void handleScreenshotButtonClick()
  })
  pauseButton.addEventListener("click", () => {
    setPaused(!isPaused)
    pauseButton.blur()
  })
  hideMenuButton.addEventListener("click", () => {
    setUiHidden(true)
  })
  menuToggleButton.addEventListener("pointerdown", (event) => {
    if (event.pointerType === "mouse" && event.button !== 0) {
      return
    }

    suppressNextMenuToggleClick = false
    startMenuToggleHold(event.pointerId)
  })
  menuToggleButton.addEventListener("pointerleave", (event) => {
    if (activeMenuTogglePointerId !== event.pointerId) {
      return
    }

    clearMenuToggleHold()
  })
  menuToggleButton.addEventListener("click", (event) => {
    if (suppressNextMenuToggleClick) {
      suppressNextMenuToggleClick = false
      event.preventDefault()
      event.stopPropagation()
      menuToggleButton.blur()
      return
    }

    setUiHidden(false)
    menuToggleButton.blur()
  })
  window.addEventListener("wheel", (event) => {
    if (isParameterControlTarget(event.target)) {
      return
    }

    event.preventDefault()

    const factor = event.deltaY < 0 ? zoomStepFactor : 1 / zoomStepFactor

    if (isUiTarget(event.target)) {
      const visibleAnchor = getVisibleAnchorPosition()
      zoomAtPoint(zoomMultiplier * factor, visibleAnchor.x, visibleAnchor.y)
      return
    }

    zoomAtPoint(zoomMultiplier * factor, event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerdown", (event) => {
    if (event.button !== 0 || !isSceneInteractionTarget(event.target)) {
      return
    }

    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (event.pointerType === "touch") {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        return
      }
    }

    const visibleAnchor = getVisibleAnchorPosition()

    isDraggingAttractor = true
    dragOffsetX = event.clientX - visibleAnchor.x
    dragOffsetY = event.clientY - visibleAnchor.y
    updateAnchorFromPointer(event.clientX, event.clientY)
  })
  window.addEventListener("pointermove", (event) => {
    lastPointerX = event.clientX
    lastPointerY = event.clientY

    if (activeMenuTogglePointerId === event.pointerId && !isPointerInsideElement(menuToggleButton, event.clientX, event.clientY)) {
      clearMenuToggleHold()
    }

    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY,
      })

      if (syncPinchState()) {
        clearDragInteraction()
        event.preventDefault()
        return
      }
    }

    if (!isDraggingAttractor || (event.buttons & 1) !== 1) {
      return
    }

    updateAnchorFromPointer(event.clientX, event.clientY)
  }, { passive: false })
  window.addEventListener("pointerup", (event) => {
    if (activeMenuTogglePointerId === event.pointerId) {
      clearMenuToggleHold()
    }

    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if (event.button !== 0) {
      return
    }

    clearDragInteraction()
  })
  window.addEventListener("pointercancel", (event) => {
    if (activeMenuTogglePointerId === event.pointerId) {
      clearMenuToggleHold()
    }

    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    clearDragInteraction()
  })
  window.addEventListener("pointerleave", (event) => {
    if (activeSceneTouches.has(event.pointerId)) {
      activeSceneTouches.delete(event.pointerId)
      syncPinchState()
    }

    if ((event.buttons & 1) === 1) {
      return
    }

    clearDragInteraction()
  })
  window.addEventListener("blur", () => {
    clearMenuToggleHold()
  })
  speedSlider.addEventListener("pointerdown", (event) => {
    activeSpeedPointerId = event.pointerId
    speedSlider.setPointerCapture(event.pointerId)
    applySpeedFromPointer(event.clientX)
    speedSlider.blur()
  })
  speedSlider.addEventListener("pointermove", (event) => {
    if (activeSpeedPointerId !== event.pointerId) {
      return
    }

    if (event.buttons === 0 && event.pointerType !== "touch") {
      return
    }

    applySpeedFromPointer(event.clientX)
  })
  speedSlider.addEventListener("pointerup", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  speedSlider.addEventListener("pointercancel", (event) => {
    if (activeSpeedPointerId === event.pointerId) {
      activeSpeedPointerId = null
    }
  })
  speedSlider.addEventListener("lostpointercapture", () => {
    activeSpeedPointerId = null
  })
  window.addEventListener("resize", resizeCanvas)
  ;["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
    window.addEventListener(eventName, (event) => {
      event.preventDefault()
    }, { passive: false })
  })
  window.addEventListener("blur", () => {
    clearZoomTrailResetDebounce()
    activeMovementKeys.clear()
    activeSceneTouches.clear()
    syncPinchState()
    clearDragInteraction()
  })

  resizeCanvas()
  updateIntegratorUI()
  setUiHidden(uiHidden)
  update()
  requestAnimationFrame(animate)

  document.addEventListener("keydown", (event) => {
    if (event.defaultPrevented || isEditableTarget(event.target)) {
      return
    }

    if (
      event.code === "KeyW" ||
      event.code === "ArrowLeft" ||
      event.code === "KeyS" ||
      event.code === "ArrowRight" ||
      event.code === "ArrowUp" ||
      event.code === "ArrowDown"
    ) {
      event.preventDefault()
      activeMovementKeys.add(event.code)
      return
    }

    if (event.code === "KeyR") {
      event.preventDefault()
      resetToInitialState()
      return
    }

    if (event.code === "Space") {
      event.preventDefault()
      if (!event.repeat) {
        setPaused(!isPaused)
      }
      return
    }

    if (event.code === "Escape") {
      event.preventDefault()
      setUiHidden(!uiHidden)
      return
    }

  })

  document.addEventListener("keyup", (event) => {
    if (
      event.code === "KeyW" ||
      event.code === "ArrowLeft" ||
      event.code === "KeyS" ||
      event.code === "ArrowRight" ||
      event.code === "ArrowDown" ||
      event.code === "ArrowUp"
    ) {
      activeMovementKeys.delete(event.code)
    }
  })

</script>
