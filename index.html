<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenz system</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: manrope;
    position: relative;
    overflow: hidden;
    background: #050505;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  #attractor {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transform: rotate(180deg);
  }

  #slider {
    width: min(88vw, 420px);
    appearance: none;
    -webkit-appearance: none;
    height: 44px;
    background: transparent;
    touch-action: pan-x;
    cursor: pointer;
  }

  #slider::-webkit-slider-runnable-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 32px;
    height: 32px;
    margin-top: -10px;
    border: 0;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
  }

  #slider::-moz-range-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  #slider::-moz-range-thumb {
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
  }

  @media (max-width: 640px) {
    #slider {
      order: 4;
      margin-top: 18px;
      width: min(92vw, 520px);
      height: 52px;
    }

    #slider::-webkit-slider-runnable-track,
    #slider::-moz-range-track {
      height: 18px;
    }

    #slider::-webkit-slider-thumb,
    #slider::-moz-range-thumb {
      width: 38px;
      height: 38px;
    }

    #slider::-webkit-slider-thumb {
      margin-top: -10px;
    }
  }

  #value {
    margin-top: 0px;
    font-size: 20px;
    padding: 6px 20px;
    backdrop-filter: blur(3px);
    border-radius: 30px;
    background: rgba(0, 0, 0, 0.308);
    color: rgba(255, 255, 255, 0.5);
  }

  .hidden,
  #app.hidden {
    display: none;
  }

  #hint {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.5;
    user-select: none;
    color: white;
  }

  h1 {
    margin: 0;
    color: rgba(255, 255, 255, 0.499);
    font-size: 24px;
    margin-bottom: 10px;
  }

  @media (max-width: 480px) {
    #hint {
      display: none;
    }

    h1 {
      margin-bottom: 10px;
    }
  }
</style>

<body>
  <canvas id="attractor"></canvas>
  <div id="app">
    <h1>Choose Color Temperature</h1>
    <input type="range" min="1000" max="10000" value="3000" id="slider">
    <div id='value'></div>
    <div id="hint">Space: toggle UI · ← →: temperature · ↑ ↓: speed</div>
  </div>
</body>
<script>
  const app = document.getElementById("app")
  const slider = document.getElementById("slider")
  const valueEl = document.getElementById("value")
  const canvas = document.getElementById("attractor")
  const ctx = canvas.getContext("2d")
  const baseTemperature = Number(slider.value)
  const baseNormalized = (baseTemperature - 1000) / 9000
  const baseScale = 11 + baseNormalized * 18

  let width = 0
  let height = 0
  let pixelRatio = 1
  let uiHidden = false
  let speedMultiplier = 1

  const state = {
    x: 0.08,
    y: 0,
    z: 0,
    hue: 30,
    stroke: "rgba(255, 224, 176, 0.28)",
    glow: "rgba(255, 224, 176, 0.18)",
    scale: 14,
    speed: 2400,
    sigma: 10,
    rho: 28,
    beta: 8 / 3,
    anchorX: 0,
    anchorY: 0,
  }

  function resizeCanvas() {
    pixelRatio = window.devicePixelRatio || 1
    width = window.innerWidth
    height = window.innerHeight
    canvas.width = Math.round(width * pixelRatio)
    canvas.height = Math.round(height * pixelRatio)
    ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0)
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)"
    ctx.fillRect(0, 0, width, height)
    updateAnchor()
  }

  function updateAnchor() {
    if (app.classList.contains("hidden")) {
      return
    }

    const rect = app.getBoundingClientRect()
    state.anchorX = rect.left + rect.width * 0.5
    state.anchorY = height * 0.18
  }

  function kelvinToRGB(k) {

    let temp = k / 100
    let r, g, b

    if (temp <= 66) {
      r = 255
      g = temp
      g = 99.47 * Math.log(g) - 161.12
      b = temp <= 19 ? 0 : 138.52 * Math.log(temp - 10) - 305.04
    } else {
      r = 329.7 * Math.pow(temp - 60, -0.133)
      g = 288.12 * Math.pow(temp - 60, -0.0755)
      b = 255
    }

    r = Math.min(255, Math.max(0, r))
    g = Math.min(255, Math.max(0, g))
    b = Math.min(255, Math.max(0, b))

    return {
      r: Math.round(r),
      g: Math.round(g),
      b: Math.round(b),
    }
  }

  function rgbToHsl({ r, g, b }) {
    const rn = r / 255
    const gn = g / 255
    const bn = b / 255
    const max = Math.max(rn, gn, bn)
    const min = Math.min(rn, gn, bn)
    const delta = max - min
    let hue = 0

    if (delta !== 0) {
      if (max === rn) {
        hue = ((gn - bn) / delta) % 6
      } else if (max === gn) {
        hue = (bn - rn) / delta + 2
      } else {
        hue = (rn - gn) / delta + 4
      }
    }

    return {
      h: Math.round(hue * 60 < 0 ? hue * 60 + 360 : hue * 60),
    }
  }

  function syncAttractor(k, rgb) {
    const normalized = (Number(k) - 1000) / 9000
    const { h } = rgbToHsl(rgb)

    state.hue = h
    state.stroke = `hsla(${h}, 90%, ${65 - normalized * 18}%, 0.28)`
    state.glow = `hsla(${h}, 100%, ${70 - normalized * 14}%, 0.18)`
    state.scale = 11 + normalized * 18
    state.speed = Math.round((800 + normalized * 3800) * speedMultiplier)
    state.sigma = 8 + normalized * 10
    state.rho = 18 + normalized * 22
    state.beta = 1.8 + normalized * 1.4
  }

  function update() {
    const k = Number(slider.value)
    const rgb = kelvinToRGB(k)

    valueEl.textContent = k + "K"
    syncAttractor(k, rgb)
    updateAnchor()
  }

  function stepAttractor(iterations) {
    const dt = 0.005
    const centerX = state.anchorX || width * 0.5
    const scaleCompensation = (state.scale - baseScale) * 30
    const centerY = (state.anchorY || height * 0.17) - scaleCompensation

    ctx.fillStyle = "rgba(0, 0, 0, 0.045)"
    ctx.fillRect(0, 0, width, height)
    ctx.lineWidth = 1.1
    ctx.strokeStyle = state.stroke
    ctx.shadowBlur = 18
    ctx.shadowColor = state.glow
    ctx.beginPath()

    for (let i = 0; i < iterations; i += 1) {
      const dx = state.sigma * (state.y - state.x)
      const dy = state.x * (state.rho - state.z) - state.y
      const dz = state.x * state.y - state.beta * state.z

      state.x += dx * dt
      state.y += dy * dt
      state.z += dz * dt

      const px = centerX + state.x * state.scale
      const py = centerY + state.z * state.scale - state.y * state.scale * 0.28

      if (i === 0) {
        ctx.moveTo(px, py)
      } else {
        ctx.lineTo(px, py)
      }
    }

    ctx.stroke()
    ctx.shadowBlur = 0
  }

  function animate() {
    stepAttractor(state.speed)
    requestAnimationFrame(animate)
  }

  slider.addEventListener("input", update)
  window.addEventListener("resize", resizeCanvas)

  resizeCanvas()
  update()
  animate()

  document.addEventListener("keydown", (event) => {
    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      event.preventDefault()

      const direction = event.code === "ArrowRight" ? 1000 : -1000
      const nextValue = Number(slider.value) + direction
      const min = Number(slider.min)
      const max = Number(slider.max)

      slider.value = Math.min(max, Math.max(min, nextValue))

      update()

      return
    }

    if (event.code === "ArrowUp" || event.code === "ArrowDown") {
      event.preventDefault()

      const direction = event.code === "ArrowUp" ? 0.15 : -0.15
      speedMultiplier = Math.min(3, Math.max(0.2, speedMultiplier + direction))
      update()

      return
    }

    if (event.code === "Space") {
      event.preventDefault()

      uiHidden = !uiHidden

      if (uiHidden) {
        app.classList.add("hidden")
      } else {
        app.classList.remove("hidden")
        updateAnchor()
      }
    }
  })
</script>

</html>
